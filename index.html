<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a56db">
<meta http-equiv="refresh" content="2; url=https://script.google.com/macros/s/AKfycbzRjduXyfm6jGpKfMv37SK2tANg3_4E_JF6YFG1b8_Fappcs9gnQLNJJJw_mfPdKvsSjw/exec">
<link rel="manifest" href="manifest.json">
<title>SPDK ITU</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(145deg,#0d2b5e 0%,#1a56db 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

/* ── Card Clay 3D ── */
.card{
  background:#fff;
  border-radius:24px;
  padding:40px 32px 36px;
  max-width:480px;
  width:100%;
  text-align:center;
  box-shadow:
    0 20px 60px rgba(0,0,0,.4),
    0 8px 20px rgba(0,0,0,.3),
    inset 0 1px 0 rgba(255,255,255,.8);
}

/* ── Logo ── */
.logo{
  width:72px;
  height:72px;
  object-fit:contain;
  margin-bottom:16px;
  animation:pop .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop{
  0%{transform:scale(.5);opacity:0}
  70%{transform:scale(1.08)}
  100%{transform:scale(1);opacity:1}
}

/* ── Colour dots — bouncing bergilir ── */
.dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-bottom:20px;
}
.dots span{
  width:10px;height:10px;
  border-radius:50%;
  display:inline-block;
  animation:dotBounce .8s ease-in-out infinite;
}
.dots span:nth-child(1){background:#e63946;animation-delay:0s}
.dots span:nth-child(2){background:#1a56db;animation-delay:.15s}
.dots span:nth-child(3){background:#f4c430;animation-delay:.3s}
.dots span:nth-child(4){background:#2dc653;animation-delay:.45s}
@keyframes dotBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

/* ── Spinner wrap ── */
.spinner-wrap{
  width:72px;height:72px;
  background:#e0f6ff;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 24px;
}
.spinner{
  width:32px;height:32px;
  border:3px solid rgba(0,174,239,.2);
  border-top-color:#00aeef;
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Text ── */
h1{
  font-size:20px;font-weight:700;
  color:#0d2b5e;
  margin-bottom:8px;line-height:1.3;
}
.subtitle{
  font-size:14px;color:#64748b;
  margin-bottom:28px;
}

/* ── Progress bar multicolour sliding ── */
.progress-track{
  width:100%;height:5px;
  background:#f1f5f9;
  border-radius:999px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,#e63946,#1a56db,#f4c430,#2dc653,#e63946);
  background-size:200% 100%;
  animation:slide 1.8s linear infinite;
}
@keyframes slide{
  0%{background-position:100% 0}
  100%{background-position:-100% 0}
}

/* ── Responsive ── */
@media(max-width:480px){
  body{padding:16px}
  .card{padding:32px 24px 32px}
}
</style>
</head>
<body>

<div class="card">
  <img src="icon-192.png" alt="SPDK" class="logo">

  <div class="dots">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>

  <h1>Sedang Menghubungkan...</h1>
  <p class="subtitle">Sila tunggu sebentar</p>

  <div class="progress-track">
    <div class="progress-bar"></div>
  </div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
setTimeout(function() {
  window.location.replace("https://script.google.com/macros/s/AKfycbzRjduXyfm6jGpKfMv37SK2tANg3_4E_JF6YFG1b8_Fappcs9gnQLNJJJw_mfPdKvsSjw/exec");
}, 1500);
</script>
</body>
</html>
