<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a56db">
<link rel="manifest" href="manifest.json">
<title>SPDK ITU — Sistem Pendigitalan Data Kursus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a56db;--primary-dark:#1e3a8a;--primary-mid:#1e429f;
  --accent:#00aeef;--bg:#f3f4f6;--white:#fff;
  --text:#111827;--muted:#6b7280;--border:#e5e7eb;
  --danger:#e02424;--success:#057a55;--warning:#d97706;
}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);transition:border-color .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.fg{margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{background:linear-gradient(180deg,#2563eb 0%,#1a56db 100%);color:#fff;box-shadow:0 8px 0 #0f3fa8}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 0 #0f3fa8}
.btn-primary:active{transform:translateY(4px);box-shadow:0 4px 0 #0f3fa8}
.btn-secondary{background:#f3f4f6;color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#e5e7eb}
.btn-danger{background:#fef2f2;color:var(--danger);border:1.5px solid #fecaca}
.btn-success{background:#ecfdf5;color:var(--success);border:1.5px solid #a7f3d0}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);padding:24px}
.auth-bg{min-height:100vh;background:linear-gradient(145deg,#0d2b5e 0%,#1a56db 100%);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.4),0 8px 20px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.8)}
.auth-logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px}
.auth-logos img{height:48px;object-fit:contain}
.auth-title{font-size:22px;font-weight:700;color:#0d2b5e;margin-bottom:4px;text-align:center}
.auth-subtitle{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center}
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.dots span{width:10px;height:10px;border-radius:50%;display:inline-block;animation:dotBounce .8s ease-in-out infinite}
.dots span:nth-child(1){background:#e63946;animation-delay:0s}
.dots span:nth-child(2){background:#1a56db;animation-delay:.15s}
.dots span:nth-child(3){background:#f4c430;animation-delay:.3s}
.dots span:nth-child(4){background:#2dc653;animation-delay:.45s}
@keyframes dotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.portal{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#1e3a8a 0%,#1e429f 100%);box-shadow:4px 0 20px rgba(0,0,0,.15);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sb-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-brand img{height:36px}
.sb-brand span{color:#fff;font-weight:700;font-size:14px;line-height:1.2}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-sec{padding:8px 20px 4px;font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.75);font-size:14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(0,174,239,.15);color:#fff;border-left-color:#00aeef}
.topbar{height:60px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;align-items:center;padding:0 24px;gap:16px;position:fixed;top:0;left:240px;right:0;z-index:99}
.tb-title{font-size:16px;font-weight:600;flex:1}
.tb-user{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted)}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#1e429f);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.main{margin-left:240px;margin-top:60px;padding:28px 28px 40px;min-height:calc(100vh - 60px)}
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideIn .3s ease;max-width:320px}
.toast.success{background:#065f46}
.toast.danger{background:#991b1b}
.toast.warning{background:#92400e}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
#lo{position:fixed;inset:0;background:rgba(255,255,255,.75);display:none;align-items:center;justify-content:center;z-index:9998}
.spinner{width:40px;height:40px;border:4px solid rgba(26,86,219,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:mIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.tw{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f9fafb;padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.bm{background:#fffbeb;color:#b45309}
.bl{background:#ecfdf5;color:#065f46}
.bt{background:#fef2f2;color:#991b1b}
.bb{background:#f3f4f6;color:#6b7280}
.ba{background:#eff6ff;color:#1d4ed8}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.sc{background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);padding:20px}
.si{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:20px}
.sn{font-size:28px;font-weight:800}
.sl{font-size:13px;color:var(--muted);margin-top:2px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.ph h2{font-size:20px;font-weight:700}
.alert{padding:14px 18px;border-radius:12px;font-size:14px;margin-bottom:16px}
.ai{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.as{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.ad{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.aw{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.sb-toggle{display:none;position:fixed;bottom:20px;left:20px;z-index:200;width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;background:var(--primary);color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(26,86,219,.4)}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.mob-ov.show{display:block}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main,.topbar{margin-left:0;left:0}
  .sb-toggle{display:flex;align-items:center;justify-content:center}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="tc"></div>
<div id="lo"><div class="spinner"></div></div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzspzwfN02MQc1qzDMX18NI_-OC_597_747ay7kous4Ql6ncDKAGktucnIaH-QXDy0Xug/exec';
const L={
  L01:'https://i.ibb.co/QvRWvqmk/1-Jata-KPKM.png',
  L02:'https://i.ibb.co/XfcvhqxC/2-Logo-DVS.png',
  L03:'https://i.ibb.co/4wJzqpVr/3-Logo-TVET-Malaysia.png',
  L04:'https://i.ibb.co/zVLt1VsH/4-Malaysia-Madani.png',
  L05:'https://i.ibb.co/twhChhXz/spdk.png'
};
let S={token:localStorage.getItem('spdk_token')||'',role:localStorage.getItem('spdk_role')||'',nama:localStorage.getItem('spdk_nama')||''};
function saveAuth(t,r,n){S.token=t;S.role=r;S.nama=n;localStorage.setItem('spdk_token',t);localStorage.setItem('spdk_role',r);localStorage.setItem('spdk_nama',n)}
function clearAuth(){S={token:'',role:'',nama:''};['spdk_token','spdk_role','spdk_nama'].forEach(k=>localStorage.removeItem(k))}
async function api(action,params={}){
  const body={action,...params};
  if(S.token)body.token=S.token;
  const res=await fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)});
  return res.json();
}
function toast(msg,type='info',ms=3500){
  const c=document.getElementById('tc'),t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),ms);
}
function loading(v){document.getElementById('lo').style.display=v?'flex':'none'}
function setView(h){document.getElementById('app').innerHTML=h}
function $(id){return document.getElementById(id)}
function on(id,ev,fn){const el=$(id);if(el)el.addEventListener(ev,fn)}
function badge(s){
  const m={menunggu:'bm',lulus:'bl',tolak:'bt',batal:'bb',aktif:'ba'};
  const lb={menunggu:'Menunggu',lulus:'Lulus',tolak:'Ditolak',batal:'Dibatal',aktif:'Aktif'};
  return`<span class="badge ${m[s]||'bb'}">${lb[s]||s}</span>`;
}
const ROUTES={
  'login':{r:pgLogin,pub:true},'daftar':{r:pgDaftar,pub:true},
  'lupa-kata-laluan':{r:pgLupa,pub:true},'reset-password':{r:pgReset,pub:true},
  'dashboard':{r:pgDashboard},'katalog-kursus':{r:pgKatalog},
  'pendaftaran-saya':{r:pgPendaftaranSaya},'sijil-saya':{r:pgSijilSaya},'view-sijil':{r:pgViewSijil},
  'maklum-balas':{r:pgMaklumBalas},'profil-saya':{r:pgProfil},
  'tukar-kata-laluan':{r:pgTukarKL},
  'admin':{r:pgAdmin,role:['admin','superadmin']},
  'admin-kursus':{r:pgAdminKursus,role:['admin','superadmin']},
  'admin-pendaftaran':{r:pgAdminPend,role:['admin','superadmin']},
  'kehadiran':{r:pgKehadiran,role:['admin','superadmin']},
  'laporan':{r:pgLaporan,role:['admin','superadmin']},
  'surat-tawaran':{r:pgSuratTawaran,role:['admin','superadmin']},
  'superadmin-pengguna':{r:pgUrusPengguna,role:['superadmin']},
  'scan-qr':{r:pgScanQR,pub:true},'verify-cert':{r:pgVerifyCert,pub:true}
};
function goTo(h){window.location.hash='#'+h}
function router(){
  const rawHash=window.location.hash.replace('#','')||'login';
  const h=rawHash.split('?')[0];
  window._routeParams=new URLSearchParams(rawHash.split('?')[1]||'');
  const rt=ROUTES[h];
  if(!rt){goTo('login');return}
  if(rt.pub){
    if(S.token&&(h==='login'||h==='daftar')){goTo(S.role==='peserta'?'dashboard':'admin');return}
    rt.r(h);return;
  }
  if(!S.token){goTo('login');return}
  if(rt.role&&!rt.role.includes(S.role)){toast('Akses ditolak.','danger');goTo(S.role==='peserta'?'dashboard':'admin');return}
  rt.r(h);
}
window.addEventListener('hashchange',router);
window.addEventListener('load',router);
function shell(title,active,body){
  const isA=['admin','superadmin'].includes(S.role);
  const isSA=S.role==='superadmin';
  const init=S.nama?S.nama[0].toUpperCase():'?';
  const pesertaLinks=[
    ['dashboard','Dashboard'],['katalog-kursus','Katalog Kursus'],
    ['pendaftaran-saya','Pendaftaran Saya'],['maklum-balas','Penilaian Kursus'],
    ['sijil-saya','Sijil Saya']
  ];
  const adminLinks=[
    ['admin','Panel Admin'],['admin-kursus','Urus Kursus'],
    ['admin-pendaftaran','Urus Pendaftaran'],['surat-tawaran','Surat Tawaran'],
    ['kehadiran','Urus Kehadiran'],['maklum-balas','Penilaian Kursus']
  ];
  const saLinks=[['superadmin-pengguna','Urus Pengguna'],['laporan','Laporan']];
  const links=isA?adminLinks:pesertaLinks;
  const navHtml=links.map(([k,lb])=>`<div class="ni ${active===k?'active':''}" onclick="goTo('${k}')">${lb}</div>`).join('');
  const saHtml=isSA?`<div class="nav-sec">Superadmin</div>${saLinks.map(([k,lb])=>`<div class="ni ${active===k?'active':''}" onclick="goTo('${k}')">${lb}</div>`).join('')}`:'';
  return`
<button class="sb-toggle" onclick="togSb()">☰</button>
<div class="mob-ov" id="mob-ov" onclick="togSb()"></div>
<div class="sidebar" id="sb">
  <div class="sb-brand"><img src="${L.L05}" alt="SPDK"><span>SPDK ITU</span></div>
  <nav class="sb-nav">
    <div class="nav-sec">${isA?'Pengurusan':'Portal Saya'}</div>
    ${navHtml}${saHtml}
    <div class="nav-sec">Akaun</div>
    <div class="ni ${active==='profil-saya'?'active':''}" onclick="goTo('profil-saya')">Profil Saya</div>
    <div class="ni ${active==='tukar-kata-laluan'?'active':''}" onclick="goTo('tukar-kata-laluan')">Tukar Kata Laluan</div>
    <div class="ni" onclick="doLogout()">Log Keluar</div>
  </nav>
</div>
<div class="topbar">
  <span class="tb-title">${title}</span>
  <div class="tb-user"><span>${S.nama}</span><div class="tb-avatar">${init}</div></div>
</div>
<div class="main">${body}</div>`;
}
function togSb(){const s=$('sb'),o=$('mob-ov');s.classList.toggle('open');o.classList.toggle('show')}
async function doLogout(){
  if(!confirm('Log keluar sekarang?'))return;
  try{await api('logKeluar')}catch(e){}
  clearAuth();goTo('login');
}
/* AUTH */
function pgLogin(){
  setView(`<div class="auth-bg"><div class="auth-card">
    <div class="auth-logos"><img src="${L.L01}"><img src="${L.L02}"><img src="${L.L03}"><img src="${L.L04}"></div>
    <div class="auth-title">SPDK ITU</div>
    <div class="auth-subtitle">Sistem Pendigitalan Data Kursus — Institut Teknologi Unggas</div>
    <div class="dots"><span></span><span></span><span></span><span></span></div>
    <div id="la"></div>
    <div class="fg"><label>E-mel</label><input type="email" id="le" placeholder="emel@dvs.gov.my"></div>
    <div class="fg"><label>Kata Laluan</label><input type="password" id="lp" placeholder="Kata laluan"></div>
    <button class="btn btn-primary btn-block" id="bl" onclick="doLogin()">Log Masuk</button>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:#6b7280">
      Belum ada akaun? <a href="#daftar">Daftar</a> &nbsp;·&nbsp; <a href="#lupa-kata-laluan">Lupa kata laluan?</a>
    </div>
  </div></div>`);
  on('lp','keydown',e=>{if(e.key==='Enter')doLogin()});
}
async function doLogin(){
  const e=$('le').value.trim(),p=$('lp').value;
  if(!e||!p){$('la').innerHTML='<div class="alert ad">Sila isi semua medan.</div>';return}
  $('bl').disabled=true;loading(true);
  try{
    const r=await api('login',{email:e,password:p});
    if(r.success){saveAuth(r.token,r.role,r.nama);toast('Selamat datang, '+r.nama+'!','success');goTo(r.role==='peserta'?'dashboard':'admin')}
    else $('la').innerHTML=`<div class="alert ad">${r.message||'Log masuk gagal.'}</div>`;
  }catch(err){$('la').innerHTML='<div class="alert ad">Ralat sambungan. Cuba lagi.</div>'}
  loading(false);const b=$('bl');if(b)b.disabled=false;
}
function pgDaftar(){
  setView(`<div class="auth-bg"><div class="auth-card" style="max-width:520px">
    <div class="auth-logos"><img src="${L.L01}"><img src="${L.L02}"><img src="${L.L03}"><img src="${L.L04}"></div>
    <div class="auth-title">Daftar Akaun</div>
    <div class="auth-subtitle">Buat akaun baru SPDK ITU</div>
    <div id="da"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="fg"><label>Nama Penuh (MyKad)</label><input id="dn" placeholder="Nama penuh"></div>
      <div class="fg"><label>No. MyKad</label><input id="dic" placeholder="Tanpa sempang"></div>
      <div class="fg"><label>E-mel</label><input type="email" id="de" placeholder="emel@dvs.gov.my"></div>
      <div class="fg"><label>No. Tel</label><input id="dt" placeholder="01x-xxxxxxx"></div>
      <div class="fg"><label>Jawatan</label><select id="dj"><option value="">-- Pilih --</option>
        <option>Pembantu Veterinar</option><option>Pembantu Makmal</option>
        <option>Penolong Pegawai Veterinar</option><option>Penolong Pegawai Sains</option>
        <option>Pegawai Sains</option><option>Pegawai Veterinar</option>
        <option>Pegawai Penyelidik</option><option>Pelatih SKM</option>
      </select></div>
      <div class="fg"><label>Gred</label><input id="dg" placeholder="cth. W17, F41"></div>
      <div class="fg"><label>Bahagian/Unit</label><input id="db" placeholder="Bahagian"></div>
      <div class="fg"><label>Kata Laluan</label><input type="password" id="dp" placeholder="Min. 8 aksara, 1 huruf besar, 1 nombor"></div>
      <div class="fg"><label>Sahkan Kata Laluan</label><input type="password" id="dp2" placeholder="Ulang kata laluan"></div>
    </div>
    <button class="btn btn-primary btn-block" id="bdr" onclick="doDaftar()">Daftar Akaun</button>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:#6b7280">Sudah ada akaun? <a href="#login">Log Masuk</a></div>
  </div></div>`);
}
async function doDaftar(){
  const v={namaMyKad:$('dn').value.trim(),noMyKad:$('dic').value.trim(),email:$('de').value.trim(),noTel:$('dt').value.trim(),jawatan:$('dj').value,gred:$('dg').value.trim(),bahagianUnit:$('db').value.trim(),password:$('dp').value};
  if(Object.values(v).some(x=>!x)){$('da').innerHTML='<div class="alert ad">Sila isi semua medan.</div>';return}
  if(v.password!==$('dp2').value){$('da').innerHTML='<div class="alert ad">Kata laluan tidak sepadan.</div>';return}
  $('bdr').disabled=true;loading(true);
  try{
    const r=await api('daftarAkaun',v);
    if(r.success){toast('Akaun berjaya didaftar! Sila log masuk.','success');goTo('login')}
    else $('da').innerHTML=`<div class="alert ad">${r.message||'Pendaftaran gagal.'}</div>`;
  }catch(e){$('da').innerHTML='<div class="alert ad">Ralat sambungan.</div>'}
  loading(false);const b=$('bdr');if(b)b.disabled=false;
}
function pgLupa(){
  setView(`<div class="auth-bg"><div class="auth-card">
    <div class="auth-logos"><img src="${L.L01}"><img src="${L.L02}"></div>
    <div class="auth-title">Lupa Kata Laluan</div>
    <div class="auth-subtitle">Masukkan e-mel untuk menerima pautan reset</div>
    <div id="lu-a"></div>
    <div class="fg"><label>E-mel</label><input type="email" id="lu-e" placeholder="emel@dvs.gov.my"></div>
    <button class="btn btn-primary btn-block" id="blu" onclick="doLupa()">Hantar Pautan Reset</button>
    <div style="text-align:center;margin-top:16px;font-size:13px"><a href="#login">← Kembali ke Log Masuk</a></div>
  </div></div>`);
}
async function doLupa(){
  const e=$('lu-e').value.trim();
  if(!e){$('lu-a').innerHTML='<div class="alert ad">Sila masukkan e-mel.</div>';return}
  $('blu').disabled=true;loading(true);
  try{
    const r=await api('lupaKataLaluan',{email:e});
    $('lu-a').innerHTML=r.success?'<div class="alert as">E-mel reset telah dihantar. Semak peti masuk anda.</div>':`<div class="alert ad">${r.message||'Gagal.'}</div>`;
  }catch(e){$('lu-a').innerHTML='<div class="alert ad">Ralat sambungan.</div>'}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTarikhPanjang(yyyymmdd){
  if(!yyyymmdd)return'-';
  var p=yyyymmdd.split('-');
  if(p.length!==3)return yyyymmdd;
  var bln=['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
  return parseInt(p[2],10)+' '+bln[parseInt(p[1],10)-1]+' '+p[0];
}
function formatTarikhPaparan(dateStr){
  if(!dateStr)return'';
  var s=String(dateStr).trim();
  if(!s)return'';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return m[3]+'/'+m[2]+'/'+m[1];
  return s;
}

    if(q.jenisSoalan==='teks'){
      const v=($('mbf-'+q.questionId)||{}).value||'';
      if(!v.trim()){toast('Sila isi semua soalan teks.','warning');return}
      jawapan.push({questionId:q.questionId,rating:0,jawapan:v.trim()});
    }else{
      const v=($('mbr-'+q.questionId)||{}).value||'';
      if(!v){toast('Sila beri penilaian bintang untuk semua soalan.','warning');return}
      jawapan.push({questionId:q.questionId,rating:parseInt(v),jawapan:''});
    }
  }
  loading(true);

  }catch(e){toast('Ralat sambungan.','danger')}
  loading(false);
}

  for(const id of ids){const v=$('mbs-'+id)?.value;if(!v){toast('Sila jawab semua soalan.','warning');return}j[id]=parseInt(v)}

    const r=await api('submitMaklumBalas',{jawapan:j,komen:$('mb-kom')?.value||''});

  }catch(e){toast('Ralat sambungan.','danger')}
  loading(false);
}

function mbAdminSwitchTab(tab){

    if(btn){
      btn.classList.toggle('btn-primary',t===tab);

async function mbAdminLoadSoalan(courseId){
  const el=$('mb-panel-soalan');
  if(!el)return;
  el.innerHTML='<div class="alert ai">Memuatkan soalan...</div>';
  try{
    const r=await api('getSoalanAdmin',{courseId});
    if(!r.success){el.innerHTML=`<div class="alert ad">${r.message||'Ralat.'}</div>`;return}
    mbAdminRenderSoalan(r.soalan||[],courseId);
  }catch(e){el.innerHTML='<div class="alert ad">Ralat sistem.</div>'}
}

function mbAdminRenderSoalan(soalan,courseId){
  const el=$('mb-panel-soalan');
  if(!el)return;
  const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const js=s=>String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const aktif=soalan.filter(q=>q.status==='aktif');
  _mbAdminSoalanList=aktif;
  const editSoalan=aktif.find(q=>q.questionId===_mbEditQuestionId);
  const aktifCount=aktif.length;
  const atHad=aktifCount>=20;
  const isEdit=!!editSoalan;
  const formTitle=isEdit?'Kemaskini Soalan':'+ Tambah Soalan';
  const formSoalan=isEdit?editSoalan.soalan:'';
  const formUrutan=isEdit?(editSoalan.urutan||1):(aktifCount+1);
  const formJenis=isEdit?(editSoalan.jenisSoalan||'rating'):'rating';

  const listHtml=aktif.length?aktif.map(q=>`
    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <span style="min-width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${q.urutan}</span>
      <span style="flex:1;font-size:14px">${esc(q.soalan)}</span>
      <span class="badge ${q.jenisSoalan==='teks'?'bb':'bl'}" style="font-size:11px;flex-shrink:0">${q.jenisSoalan==='teks'?'Teks':'Rating'}</span>
      <button class="btn btn-secondary btn-sm" onclick="mbAdminEditSoalan('${js(q.questionId)}','${js(courseId)}')" title="Edit soalan">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="mbAdminPadamSoalan('${js(q.questionId)}','${js(courseId)}')" title="Padam soalan">🗑</button>
    </div>`).join(''):'<div style="padding:8px 0;color:var(--muted)">Tiada soalan penilaian untuk kursus ini lagi.</div>';

  const formHtml=atHad&&!isEdit
    ?`<div class="alert aw" style="margin-top:12px">Had maksimum 20 soalan aktif telah dicapai untuk kursus ini.</div>`
    :`<div class="card" style="margin-top:16px">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">${formTitle}</div>
        <div class="fg">
          <label>Teks Soalan <span id="mb-sc" style="font-weight:400;color:var(--muted)">0/200</span></label>
          <textarea id="mb-soalan-input" rows="3" maxlength="200" placeholder="Masukkan teks soalan..." oninput="$('mb-sc').textContent=this.value.length+'/200'">${esc(formSoalan)}</textarea>
        </div>
        <div class="fg" style="max-width:160px">
          <label>Urutan</label>
          <input type="number" id="mb-urutan-input" min="1" max="20" value="${formUrutan}">
        </div>
        <div class="fg" style="max-width:200px">
          <label>Jenis Soalan</label>
          <select id="mb-jenis-input">
            <option value="rating" ${formJenis==='rating'?'selected':''}>Penilaian Bintang (1-5)</option>
            <option value="teks" ${formJenis==='teks'?'selected':''}>Jawapan Teks Bebas</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="mbAdminSimpanSoalan('${js(courseId)}')">${isEdit?'Simpan Perubahan':'Tambah Soalan'}</button>
          ${isEdit?`<button class="btn btn-secondary" onclick="mbAdminBatalEditSoalan('${js(courseId)}')">Batal Edit</button>`:''}
        </div>
      </div>`;

  el.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700">${aktifCount}/20 soalan aktif</span>
      </div>
      ${listHtml}
    </div>
    ${formHtml}`;
  if($('mb-sc'))$('mb-sc').textContent=String(formSoalan||'').length+'/200';
}

function mbAdminEditSoalan(questionId,courseId){
  _mbEditQuestionId=questionId;
  mbAdminRenderSoalan(_mbAdminSoalanList,courseId);
  const form=$('mb-soalan-input');
  if(form)form.focus();
}

function mbAdminBatalEditSoalan(courseId){
  _mbEditQuestionId='';
  mbAdminRenderSoalan(_mbAdminSoalanList,courseId);
}

async function mbAdminPadamSoalan(questionId,courseId){
  if(!confirm('Padam soalan ini? Tindakan ini tidak boleh diundur.'))return;
  loading(true);
  try{
    const r=await api('padamSoalan',{questionId});
    toast(r.success?'Soalan berjaya dipadam.':(r.message||'Gagal padam.'),r.success?'success':'danger');
    if(r.success)mbAdminLoadSoalan(courseId);
  }catch(e){toast('Ralat sistem.','danger')}
  loading(false);
}

async function mbAdminTambahSoalan(courseId){
  const soalanEl=$('mb-soalan-input');
  const urutanEl=$('mb-urutan-input');
  const jenisEl=$('mb-jenis-input');
  const soalan=(soalanEl?.value||'').trim();
  const urutan=parseInt(urutanEl?.value,10);
  const jenisSoalan=jenisEl?.value||'rating';
  if(!soalan){toast('Teks soalan tidak boleh kosong.','warning');return}
  if(soalan.length>200){toast('Soalan tidak boleh melebihi 200 aksara.','warning');return}
  if(isNaN(urutan)||urutan<1||urutan>20){toast('Urutan mestilah nombor 1 hingga 20.','warning');return}
  if(!['rating','teks'].includes(jenisSoalan)){toast('Jenis soalan tidak sah.','warning');return}
  loading(true);
  try{
    const r=await api('tambahSoalan',{courseId,soalan,urutan,jenisSoalan});
    toast(r.success?'Soalan berjaya ditambah.':(r.message||'Gagal.'),r.success?'success':'danger');
    if(r.success)mbAdminLoadSoalan(courseId);
  }catch(e){toast('Ralat sistem.','danger')}
  loading(false);
}

function mbAdminSimpanSoalan(courseId){
  if(_mbEditQuestionId)return mbAdminKemaskiniSoalan(courseId);
  return mbAdminTambahSoalan(courseId);
}

async function mbAdminKemaskiniSoalan(courseId){
  const soalanEl=$('mb-soalan-input');
  const urutanEl=$('mb-urutan-input');
  const jenisEl=$('mb-jenis-input');
  const soalan=(soalanEl?.value||'').trim();
  const urutan=parseInt(urutanEl?.value,10);
  const jenisSoalan=jenisEl?.value||'rating';
  if(!soalan){toast('Teks soalan tidak boleh kosong.','warning');return}
  if(soalan.length>200){toast('Soalan tidak boleh melebihi 200 aksara.','warning');return}
  if(isNaN(urutan)||urutan<1||urutan>20){toast('Urutan mestilah nombor 1 hingga 20.','warning');return}
  if(!['rating','teks'].includes(jenisSoalan)){toast('Jenis soalan tidak sah.','warning');return}
  loading(true);
  try{
    const r=await api('kemaskinSoalan',{courseId,questionId:_mbEditQuestionId,soalan,urutan,jenisSoalan});

async function mbAdminLoadStatus(courseId){
  const el=$('mb-panel-status');

function mbAdminRenderStatus(cari){
  const el=$('mb-panel-status');
  if(!el)return;
  const q=(cari||'').toLowerCase().trim();
  const rows=q?_mbStatusCache.filter(x=>(x.nama||'').toLowerCase().includes(q)):_mbStatusCache;
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <input type="text" id="mb-status-cari" placeholder="🔍 Cari nama peserta..." oninput="mbAdminFilterStatus()">
    </div>
    ${rows.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th style="width:40px">No.</th><th>Nama</th><th>Maklum Balas</th><th>Sijil</th>
    </tr></thead><tbody>
      ${rows.map((x,i)=>`<tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td>${x.nama||'-'}</td>
        <td>${x.sudahHantar?'<span class="badge bl">✓ Sudah Hantar</span>':'<span class="badge bb">✗ Belum Hantar</span>'}</td>
        <td>${x.adaSijil?'<span class="badge bl">✓ Ada</span>':'<span style="color:var(--muted)">—</span>'}</td>
      </tr>`).join('')}
    </tbody></table></div>`:'<div class="alert ai">Tiada peserta berdaftar untuk kursus ini.</div>'}`;
  const inp=$('mb-status-cari');
  if(inp){
    inp.value=cari||'';
    inp.focus();
    inp.setSelectionRange(inp.value.length,inp.value.length);
  }
}

function mbAdminFilterStatus(){
  const cari=($('mb-status-cari')||{}).value||'';
  mbAdminRenderStatus(cari);
}

async function saveKursus(idx){
  const editMode=Number.isInteger(idx);
  const k=editMode?kuKursusRows[idx]:null;
  const namaKursus=$('mkn').value.trim();
  const penerangan=$('mkp').value.trim();
  const tarikhMula=$('mkm').value;
  const tarikhTamat=$('mkt').value;
  const masaMula=$('mkmm').value;
  const masaTamat=$('mkmt').value;
  const tempat=$('mkl').value.trim();
  if(!namaKursus||!penerangan||!tarikhMula||!tarikhTamat||!masaMula||!masaTamat||!tempat){
    $('mka').innerHTML='<div class="alert ad">Sila isi semua medan bertanda wajib.</div>';
    return;
  }
  const btn=$('mk-btn-save');
  btn.disabled=true; loading(true);
  try{
    const payload={
      namaKursus, penerangan, tarikhMula, tarikhTamat,
      masaMula, masaTamat, tempat,
      tarikhMulaDaftar:$('mkrd').value, tarikhTutupDaftar:$('mktd').value
    };
    if(editMode)payload.courseId=k.courseId;
    const r=await api(editMode?'kemaskinikursus':'ciptaKursus',payload);
    if(r.success){toast(editMode?'Kursus berjaya dikemaskini.':'Kursus berjaya ditambah.','success');document.getElementById('mk').remove();loadKursus()}
    else $('mka').innerHTML=`<div class="alert ad">${r.message||'Gagal.'}</div>`;
  }catch(e){toast('Ralat sambungan.','danger')}
  loading(false); btn.disabled=false;
}

function khGenerateHari(tarikhMula,tarikhTamat){
  const hasil=[];
  let d=new Date(tarikhMula+'T00:00:00');
  const end=new Date(tarikhTamat+'T00:00:00');
  let h=1;
  while(d<=end&&h<=30){
    const ymd=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    hasil.push({hari:String(h),tarikh:ymd});
    d.setDate(d.getDate()+1); h++;
  }
  return hasil;
}

function formatTarikhKH(ymd){
  if(!ymd)return '-';
  const p=ymd.split('-'); if(p.length!==3)return ymd;
  const bln=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
  return parseInt(p[2],10)+' '+bln[parseInt(p[1],10)-1]+' '+p[0];
}
function khYmdToDDMMYYYY(ymd){
  const p=ymd.split('-'); return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):ymd;
}
function khDDMMYYYYtoYMD(s){
  const p=s.split('/'); return p.length===3?(p[2]+'-'+p[1]+'-'+p[0]):s;
}

function khOnKursusChange(){

  if(!courseId)return;
  const k=khKursusData.find(x=>x.courseId===courseId);
  if(!k)return;
  const hariList=khGenerateHari(k.tarikhMula,k.tarikhTamat);
  if(hariList.length===1){
    khHariTerpilih=hariList[0];
    khLoadPeserta(courseId,khHariTerpilih.hari);

}

function khToggleSemua(chk){
  document.querySelectorAll('.kh-chk').forEach(c=>{c.checked=chk.checked;khPesertaData[parseInt(c.dataset.idx)].hadir=chk.checked});
  khUpdateRingkasan();
}
function khOnCheckChange(chk){
  khPesertaData[parseInt(chk.dataset.idx)].hadir=chk.checked;
  khSyncPilihSemua();
  khUpdateRingkasan();
}
function khSyncPilihSemua(){
  const all=$('kh-chk-semua'); if(!all)return;
  const chks=document.querySelectorAll('.kh-chk');
  const semua=Array.prototype.every.call(chks,c=>c.checked);
  all.checked=semua;
  all.indeterminate=!semua&&Array.prototype.some.call(chks,c=>c.checked);
}
function khUpdateRingkasan(){
  const hadir=khPesertaData.filter(p=>p.hadir).length;
  const el=$('kh-hadir-count'); if(el)el.textContent=hadir;

async function khJanaQR(courseId,hari,tarikhDDMMYYYY){
  const btn=$('kh-btn-jana');
  if(btn){btn.disabled=true;btn.textContent='Menjana...'}
  try{
    const r=await api('getQRCode',{courseId,hari,tarikhKursus:tarikhDDMMYYYY});
    if(r.success){khRenderQR(r,courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY),tarikhDDMMYYYY);toast('QR Code berjaya dijana.','success')}
    else{if(btn){btn.disabled=false;btn.textContent='Jana QR Code'}toast(r.message||'Ralat menjana QR.','danger')}
  }catch(e){if(btn){btn.disabled=false;btn.textContent='Jana QR Code'}toast('Ralat sistem.','danger')}
}

function khJanaQRSemula(courseId,hari,tarikhDDMMYYYY){
  if(!confirm('QR lama akan tidak sah serta-merta. Peserta yang belum scan perlu guna QR baru ini.\n\nTeruskan jana QR Code baharu?'))return;
  khJanaQRSemulaKonfirm(courseId,hari,tarikhDDMMYYYY);
}

async function khJanaQRSemulaKonfirm(courseId,hari,tarikhDDMMYYYY){
  $('kh-qr').innerHTML='<div class="card"><div class="alert ai" style="margin:0">Menjana QR baharu...</div></div>';
  try{
    const r=await api('janaQRCodeBaharu',{courseId,hari,tarikhKursus:tarikhDDMMYYYY});
    if(r.success){khRenderQR(r,courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY),tarikhDDMMYYYY);toast('QR Code baharu berjaya dijana.','success')}
    else{toast(r.message||'Ralat menjana QR.','danger');khLoadQR(courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY))}
  }catch(e){toast('Ralat sistem.','danger');khLoadQR(courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY))}
}

function khMuatTurunQR(qrUrl){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const canvas=document.createElement('canvas');
    canvas.width=img.width; canvas.height=img.height;
    canvas.getContext('2d').drawImage(img,0,0);
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download='QR_Kehadiran_Hari'+(khHariTerpilih?khHariTerpilih.hari:'')+'.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  img.onerror=function(){
    const a=document.createElement('a');
    a.href=qrUrl; a.target='_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  img.src=qrUrl;
}

      <button class="btn btn-secondary btn-sm up-tab" data-tab="admin" onclick="upSetTab('admin')">Admin <span id="up-cnt-admin">0</span></button>
      <button class="btn btn-secondary btn-sm up-tab" data-tab="superadmin" onclick="upSetTab('superadmin')">Superadmin <span id="up-cnt-superadmin">0</span></button>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:140px">
          <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;display:block">Status</label>
          <select id="up-fs" onchange="upApplyFilter()">
            <option value="">Semua Status</option>
            <option value="aktif">Aktif</option>
            <option value="nyahaktif">Nyahaktif</option>
          </select>
        </div>
        <div style="flex:1;min-width:160px">
          <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;display:block">Jawatan</label>
          <select id="up-fj" onchange="upApplyFilter()">
            <option value="">Semua Jawatan</option>
            <option>Pembantu Veterinar</option><option>Pembantu Makmal</option>
            <option>Penolong Pegawai Veterinar</option><option>Penolong Pegawai Sains</option>
            <option>Pegawai Sains</option><option>Pegawai Veterinar</option>
            <option>Pegawai Penyelidik</option><option>Pelatih SKM</option>
          </select>
        </div>
        <div style="flex:1;min-width:120px">
          <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;display:block">Gred</label>
          <select id="up-fg" onchange="upApplyFilter()">
            <option value="">Semua Gred</option>
          </select>
        </div>
        <div style="flex:0">
          <label style="font-size:12px;font-weight:600;color:#374151;margin-bottom:4px;display:block">&nbsp;</label>
          <span id="up-count-label" style="font-size:13px;color:var(--muted);display:inline-block;padding:10px 4px">0 pengguna</span>
        </div>
      </div>
    </div>
    <div id="pgc"><div class="alert ai">Memuatkan...</div></div>
  `));
  loadPengguna();
}

async function loadPengguna(){
  $('pgc').innerHTML='<div class="alert ai">Memuatkan...</div>';
  try{
    const r=await api('getSenaraiPengguna',{semua:true});
    _upAllData=r.pengguna||r.data||[];
    upPopulateGred();
    upUpdateCounts();
    upApplyFilter();
  }catch(e){$('pgc').innerHTML='<div class="alert ad">Ralat memuatkan pengguna.</div>'}
}

function upPopulateGred(){
  const seen={};
  const opts=['<option value="">Semua Gred</option>'];
  _upAllData.forEach(u=>{
    const g=(u.gred||'').trim();
    if(g&&!seen[g]){seen[g]=true;opts.push(`<option value="${g}">${g}</option>`)}
  });
  const sel=$('up-fg');
  if(sel)sel.innerHTML=opts.join('');
}

function upUpdateCounts(){
  const counts={semua:_upAllData.length,peserta:0,admin:0,superadmin:0};
  _upAllData.forEach(u=>{
    const r=(u.role||u.rol||'').toLowerCase();
    if(counts[r]!==undefined)counts[r]++;
  });
  ['semua','peserta','admin','superadmin'].forEach(t=>{
    const el=$('up-cnt-'+t);
    if(el)el.textContent=counts[t];
  });
}

function upSetTab(tab){
  _upTabAktif=tab;
  document.querySelectorAll('.up-tab').forEach(b=>{
    const active=b.dataset.tab===tab;
    b.classList.toggle('btn-primary',active);
    b.classList.toggle('btn-secondary',!active);
  });
  upApplyFilter();
}

function upApplyFilter(){
  const fs=($('up-fs')||{}).value||'';
  const fj=($('up-fj')||{}).value||'';
  const fg=($('up-fg')||{}).value||'';
  const rows=_upAllData.filter(u=>{
    const role=(u.role||u.rol||'').toLowerCase();
    const status=(u.status||'').toLowerCase();
    const matchTab=_upTabAktif==='semua'||role===_upTabAktif;
    const matchStatus=!fs||status===fs;
    const matchJawatan=!fj||(u.jawatan||'')===fj;
    const matchGred=!fg||(u.gred||'').trim()===fg;
    return matchTab&&matchStatus&&matchJawatan&&matchGred;
  });
  const lbl=$('up-count-label');
  if(lbl)lbl.textContent=rows.length+' pengguna';
  upRenderTable(rows);
}

function upRenderTable(rows){
  if(!rows.length){
    $('pgc').innerHTML='<div class="alert ai">Tiada pengguna sepadan dengan penapis.</div>';
    return;
  }
  const roleBadge=r=>{
    const m={peserta:'bb',admin:'ba',superadmin:'bl'};
    return`<span class="badge ${m[r]||'bb'}" style="text-transform:capitalize">${r||'-'}</span>`;
  };
  $('pgc').innerHTML=`<div class="tw"><table>
    <thead><tr>
      <th style="width:40px">No.</th>
      <th>Pengguna</th>
      <th>Maklumat</th>
      <th>Role</th>
      <th>Status</th>
      <th>Tindakan</th>
    </tr></thead>
    <tbody>
    ${rows.map((x,i)=>{
      const role=(x.role||x.rol||'peserta').toLowerCase();
      const status=(x.status||'aktif').toLowerCase();
      const aktif=status==='aktif';
      const isSA=role==='superadmin';
      return`<tr>
        <td style="color:var(--muted);font-size:12px">${i+1}</td>
        <td>
          <div style="font-weight:600;font-size:14px">${x.nama||'-'}</div>
          <div style="font-size:12px;color:var(--muted)">${x.email||x.emel||'-'}</div>
        </td>
        <td>
          <div style="font-size:13px">${x.jawatan||'-'} · ${x.gred||'-'}</div>
          <div style="font-size:12px;color:var(--muted)">${x.bahagianUnit||x.bahagian||'-'}</div>
        </td>
        <td>${roleBadge(role)}</td>
        <td><span class="badge ${aktif?'bl':'bb'}">${aktif?'Aktif':'Nyahaktif'}</span></td>
        <td>
          <div style="display:flex;flex-direction:column;gap:4px">
            ${!isSA?`<button class="btn btn-secondary btn-sm" style="font-size:11px" onclick="upTukarRole('${x.userId}','${role}','${(x.nama||'').replace(/'/g,'')}')">Tukar Role</button>`:''}
            ${aktif
              ?`<button class="btn btn-danger btn-sm" style="font-size:11px" onclick="nyahaktifUser('${x.userId}','${(x.nama||'').replace(/'/g,'')}')">Nyahaktif</button>`
              :`<button class="btn btn-success btn-sm" style="font-size:11px" onclick="aktifkanUser('${x.userId}','${(x.nama||'').replace(/'/g,'')}')">Aktifkan</button>`
            }
            ${!isSA?`<button class="btn btn-secondary btn-sm" style="font-size:11px" onclick="resetPWUser('${x.userId}','${(x.nama||'').replace(/'/g,'')}')">Reset KL</button>`:''}
          </div>
        </td>
      </tr>`;
    }).join('')}
    </tbody>
  </table></div>`;
}

async function upTukarRole(userId,roleSemasa,nama){
  const roleList=['peserta','admin','superadmin'];
  const roleBaru=roleList.filter(r=>r!==roleSemasa);
  const pilihan=roleBaru.map((r,i)=>`${i+1}. ${r}`).join('\n');
  const input=prompt(`Tukar role "${nama}" (semasa: ${roleSemasa})\n\nPilih role baru:\n${pilihan}\n\nTaip nombor pilihan:`);
  if(!input)return;
  const idx=parseInt(input)-1;
  if(idx<0||idx>=roleBaru.length){toast('Pilihan tidak sah.','warning');return}
  const roleBaruFinal=roleBaru[idx];
  if(!confirm(`Tukar role ${nama} dari "${roleSemasa}" → "${roleBaruFinal}"?`))return;
  loading(true);
  try{
    const r=await api('tukarRolePengguna',{userId,roleBaru:roleBaruFinal});
    toast(r.success?`Role ${nama} berjaya ditukar kepada ${roleBaruFinal}.`:(r.message||'Gagal.'),r.success?'success':'danger');
    if(r.success)loadPengguna();
  }catch(e){toast('Ralat sistem.','danger')}
  loading(false);
}

async function nyahaktifUser(id,nama){
  if(!confirm(`Nyahaktifkan akaun "${nama}"?`))return;
  loading(true);
  try{
    const r=await api('nyahaktifPengguna',{userId:id});
    toast(r.success?'Pengguna berjaya dinyahaktifkan.':(r.message||'Gagal.'),r.success?'success':'danger');
    if(r.success)loadPengguna();
  }catch(e){toast('Ralat.','danger')}
  loading(false);
}

async function aktifkanUser(id,nama){
  if(!confirm(`Aktifkan semula akaun "${nama}"?`))return;
  loading(true);
  try{
    const r=await api('aktifkanPengguna',{userId:id});
    toast(r.success?'Pengguna berjaya diaktifkan.':(r.message||'Gagal.'),r.success?'success':'danger');
    if(r.success)loadPengguna();
  }catch(e){toast('Ralat.','danger')}
  loading(false);
}

async function resetPWUser(id,nama){
  if(!confirm(`Reset kata laluan untuk "${nama}"? E-mel notifikasi akan dihantar.`))return;
  loading(true);
  try{
    const r=await api('resetKataLaluanAdmin',{userId:id});
    toast(r.success?'Kata laluan direset. E-mel dihantar.':(r.message||'Gagal.'),r.success?'success':'danger');
  }catch(e){toast('Ralat.','danger')}
  loading(false);
}
/* AWAM */
function pgScanQR(){
  const params=new URLSearchParams(window.location.hash.split('?')[1]||'');
  const courseId=params.get('courseId')||'';
  const hari=params.get('hari')||'';
  const tarikh=params.get('tarikh')||'';
  setView(`<div class="auth-bg"><div class="auth-card">
    <div class="auth-logos"><img src="${L.L02}"></div>
    <div class="auth-title">Imbas QR Kehadiran</div>
    <div class="auth-subtitle">${tarikh?'Hari '+hari+' — '+tarikh:'Masukkan kod QR yang diimbas'}</div>
    <div id="qra"></div>
    <div class="fg"><label>Kod QR / Token</label><input id="qrk" value="${courseId&&hari?courseId+'|'+hari+'|'+tarikh:''}" placeholder="Kod QR"></div>
    <button class="btn btn-primary btn-block" onclick="doScanQR()">Rekod Kehadiran</button>
  </div></div>`);
  if(courseId&&hari&&S.token)setTimeout(doScanQR,500);
}
async function doScanQR(){
  const k=$('qrk').value.trim();
  if(!k){$('qra').innerHTML='<div class="alert ad">Sila masukkan kod QR.</div>';return}
  if(!S.token){toast('Sila log masuk dahulu.','warning');goTo('login');return}
  loading(true);
  try{
    const r=await api('scanQR',{qrToken:k});
    $('qra').innerHTML=r.success?`<div class="alert as">✅ Kehadiran berjaya direkod untuk <strong>${r.nama||''}</strong>.</div>`:`<div class="alert ad">${r.message||'Kod QR tidak sah.'}</div>`;
  }catch(e){$('qra').innerHTML='<div class="alert ad">Ralat sambungan.</div>'}
  loading(false);
}
function pgVerifyCert(){
  const params=new URLSearchParams(window.location.hash.split('?')[1]||'');
  const certId=params.get('certId')||'';
  setView(`<div class="auth-bg"><div class="auth-card">
    <div class="auth-logos"><img src="${L.L01}"><img src="${L.L02}"><img src="${L.L03}"></div>
    <div class="auth-title">Pengesahan Sijil</div>
    <div class="auth-subtitle">Masukkan nombor sijil untuk mengesahkan kesahihannya</div>
    <div id="certa"></div>
    <div class="fg"><label>Nombor Sijil</label><input id="certn" value="${certId}" placeholder="cth. CERT-01012026-1234"></div>
    <button class="btn btn-primary btn-block" onclick="doVerify()">Sahkan Sijil</button>
    <div id="certr"></div>
  </div></div>`);
  if(certId)setTimeout(doVerify,300);
}
async function doVerify(){
  const n=$('certn').value.trim();
  if(!n){$('certa').innerHTML='<div class="alert ad">Sila masukkan nombor sijil.</div>';return}
  loading(true);
  try{
    const r=await api('verifyCert',{certId:n});
    $('certr').innerHTML=r.success&&r.data
      ?`<div style="margin-top:20px" class="alert as"><strong>✅ Sijil Sah</strong><br>Nama: ${r.data.nama}<br>Kursus: ${r.data.namaKursus}<br>Tarikh: ${r.data.tarikhIssue}</div>`
      :`<div style="margin-top:20px" class="alert ad">❌ ${r.message||'Sijil tidak dijumpai atau tidak sah.'}</div>`;
  }catch(e){$('certr').innerHTML='<div style="margin-top:20px" class="alert ad">Ralat sambungan.</div>'}
  loading(false);
}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
