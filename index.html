<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a56db">
<link rel="manifest" href="manifest.json">
<title>SPDK ITU — Sistem Pendigitalan Data Kursus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a56db;--primary-dark:#1e3a8a;--primary-mid:#1e429f;
  --accent:#00aeef;--bg:#f3f4f6;--white:#fff;
  --text:#111827;--muted:#6b7280;--border:#e5e7eb;
  --danger:#e02424;--success:#057a55;--warning:#d97706;
}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--text);transition:border-color .2s;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--primary)}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:5px}
.fg{margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s}
.btn-primary{background:linear-gradient(180deg,#2563eb 0%,#1a56db 100%);color:#fff;box-shadow:0 8px 0 #0f3fa8}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 0 #0f3fa8}
.btn-primary:active{transform:translateY(4px);box-shadow:0 4px 0 #0f3fa8}
.btn-secondary{background:#f3f4f6;color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:hover{background:#e5e7eb}
.btn-danger{background:#fef2f2;color:var(--danger);border:1.5px solid #fecaca}
.btn-success{background:#ecfdf5;color:var(--success);border:1.5px solid #a7f3d0}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-block{width:100%}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);padding:24px}
.auth-bg{min-height:100vh;background:linear-gradient(145deg,#0d2b5e 0%,#1a56db 100%);display:flex;align-items:center;justify-content:center;padding:24px}
.auth-card{background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.4),0 8px 20px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.8)}
.auth-logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:24px}
.auth-logos img{height:48px;object-fit:contain}
.auth-title{font-size:22px;font-weight:700;color:#0d2b5e;margin-bottom:4px;text-align:center}
.auth-subtitle{font-size:13px;color:var(--muted);margin-bottom:28px;text-align:center}
.dots{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.dots span{width:10px;height:10px;border-radius:50%;display:inline-block;animation:dotBounce .8s ease-in-out infinite}
.dots span:nth-child(1){background:#e63946;animation-delay:0s}
.dots span:nth-child(2){background:#1a56db;animation-delay:.15s}
.dots span:nth-child(3){background:#f4c430;animation-delay:.3s}
.dots span:nth-child(4){background:#2dc653;animation-delay:.45s}
@keyframes dotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.portal{display:flex;min-height:100vh}
.sidebar{width:240px;flex-shrink:0;background:linear-gradient(180deg,#1e3a8a 0%,#1e429f 100%);box-shadow:4px 0 20px rgba(0,0,0,.15);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sb-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sb-brand img{height:36px}
.sb-brand span{color:#fff;font-weight:700;font-size:14px;line-height:1.2}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-sec{padding:8px 20px 4px;font-size:11px;font-weight:700;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;color:rgba(255,255,255,.75);font-size:14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:rgba(0,174,239,.15);color:#fff;border-left-color:#00aeef}
.topbar{height:60px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;align-items:center;padding:0 24px;gap:16px;position:fixed;top:0;left:240px;right:0;z-index:99}
.tb-title{font-size:16px;font-weight:600;flex:1}
.tb-user{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted)}
.tb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#1e429f);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.main{margin-left:240px;margin-top:60px;padding:28px 28px 40px;min-height:calc(100vh - 60px)}
#tc{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:#1e293b;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.25);animation:slideIn .3s ease;max-width:320px}
.toast.success{background:#065f46}
.toast.danger{background:#991b1b}
.toast.warning{background:#92400e}
@keyframes slideIn{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
#lo{position:fixed;inset:0;background:rgba(255,255,255,.75);display:none;align-items:center;justify-content:center;z-index:9998}
.spinner{width:40px;height:40px;border:4px solid rgba(26,86,219,.2);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.app-version{margin-top:16px;text-align:center;font-size:11px;color:rgba(107,114,128,.85)}
.main-version{margin-top:28px;text-align:right;font-size:11px;color:var(--muted)}
.update-card{position:fixed;right:20px;bottom:20px;z-index:10000;background:#fff;border:1px solid var(--border);border-radius:16px;padding:18px;width:min(360px,calc(100vw - 32px));box-shadow:0 20px 50px rgba(15,23,42,.22);animation:slideIn .25s ease}
.update-title{font-size:16px;font-weight:700;margin-bottom:6px;color:#111827}
.update-msg{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.update-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;padding:16px}
.modal{background:#fff;border-radius:20px;padding:32px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:mIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes mIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.tw{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:#f9fafb;padding:10px 14px;text-align:left;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
td{padding:12px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f9fafb}
.badge{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600}
.bm{background:#fffbeb;color:#b45309}
.bl{background:#ecfdf5;color:#065f46}
.bt{background:#fef2f2;color:#991b1b}
.bb{background:#f3f4f6;color:#6b7280}
.ba{background:#eff6ff;color:#1d4ed8}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.sc{background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);padding:20px}
.si{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:20px}
.sn{font-size:28px;font-weight:800}
.sl{font-size:13px;color:var(--muted);margin-top:2px}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.ph h2{font-size:20px;font-weight:700}
.alert{padding:14px 18px;border-radius:12px;font-size:14px;margin-bottom:16px}
.ai{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.as{background:#ecfdf5;color:#065f46;border:1px solid #a7f3d0}
.ad{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.aw{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.sb-toggle{display:none;position:fixed;bottom:20px;left:20px;z-index:200;width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;background:var(--primary);color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(26,86,219,.4)}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.mob-ov.show{display:block}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main,.topbar{margin-left:0;left:0}
  .sb-toggle{display:flex;align-items:center;justify-content:center}
  .main-version{text-align:center}
  .update-card{left:16px;right:16px;bottom:16px;width:auto}
  .update-actions .btn{flex:1}
}

#st-editor table{border:none!important;border-collapse:collapse!important;width:100%!important;margin:12px 0!important}
#st-editor tr{border:none!important}
#st-editor td,#st-editor th{border:none!important;background:#fff!important;padding:6px!important}
</style>
</head>
<body>
<div id="app"></div>
<div id="tc"></div>
<div id="lo"><div class="spinner"></div></div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbzspzwfN02MQc1qzDMX18NI_-OC_597_747ay7kous4Ql6ncDKAGktucnIaH-QXDy0Xug/exec';
const APP_VERSION='1.0.8';
const L={
  L01:'./logo-jata-kpkm.png',
  L02:'./logo-dvs.png',
  L03:'./logo-tvet.png',
  L04:'./logo-madani.png',
  L05:'./logo-spdk.png'
};
let S={token:localStorage.getItem('spdk_token')||'',role:localStorage.getItem('spdk_role')||'',nama:localStorage.getItem('spdk_nama')||''};
const PENDING_ATTENDANCE_KEY='spdk_pending_attendance';
const ATTENDANCE_AUTO_KEY='spdk_pending_attendance_auto';
let updateWorker=null;
let authBootstrapDone=false;
let authBootstrapInFlight=false;
let authExpiryHandling=false;
let authNotice='';
const PUBLIC_API_ACTIONS=new Set(['login','daftarAkaun','lupaKataLaluan','resetKataLaluan','verifyCert','getBahagianUnit']);
const AUTH_EXPIRY_EXEMPT_ACTIONS=new Set(['renewSession','logKeluar']);
function saveAuth(t,r,n){S.token=t;S.role=r;S.nama=n;authExpiryHandling=false;authNotice='';localStorage.setItem('spdk_token',t);localStorage.setItem('spdk_role',r);localStorage.setItem('spdk_nama',n)}
function clearAuth(){S={token:'',role:'',nama:''};['spdk_token','spdk_role','spdk_nama'].forEach(k=>localStorage.removeItem(k))}
function isPublicApiAction(action){return PUBLIC_API_ACTIONS.has(action)}
function isSessionExpiredResponse(result){
  if(!result||result.success!==false)return false;
  if(result.auth===false)return true;
  const message=String(result.message||'').trim();
  return['Sesi tidak dijumpai.','Sesi telah tamat.','Sesi telah tamat tempoh.'].includes(message);
}
function handleExpiredSession(){
  if(authExpiryHandling)return;
  authExpiryHandling=true;
  authBootstrapDone=true;
  authNotice='Sesi anda telah tamat. Sila log masuk semula.';
  clearAuth();
  loading(false);
  if(window.location.hash!=='#login')goTo('login');
  else router();
}
function authExpiredError(message){
  const error=new Error(message||'Sesi telah tamat.');
  error.name='AuthExpiredError';
  return error;
}
function normalizeAttendanceCode(value){return String(value||'').trim().toUpperCase()}
function getPendingAttendance(){
  try{
    const raw=sessionStorage.getItem(PENDING_ATTENDANCE_KEY);
    if(!raw)return null;
    const data=JSON.parse(raw);
    const shortCode=normalizeAttendanceCode(data.shortCode);
    if(!shortCode)return null;
    return{shortCode,via:data.via==='qr'?'qr':''};
  }catch(e){sessionStorage.removeItem(PENDING_ATTENDANCE_KEY);return null}
}
function savePendingAttendance(shortCode,via){
  const next={shortCode:normalizeAttendanceCode(shortCode),via:via==='qr'?'qr':''};
  if(!next.shortCode)return null;
  const current=getPendingAttendance();
  if(!current||current.shortCode!==next.shortCode||current.via!==next.via){
    sessionStorage.removeItem(ATTENDANCE_AUTO_KEY);
  }
  sessionStorage.setItem(PENDING_ATTENDANCE_KEY,JSON.stringify(next));
  return next;
}
function clearPendingAttendance(){
  sessionStorage.removeItem(PENDING_ATTENDANCE_KEY);
  sessionStorage.removeItem(ATTENDANCE_AUTO_KEY);
}
function completePendingAttendance(){
  clearPendingAttendance();
  if(window.location.hash.indexOf('#scan-qr')===0){
    window.history.replaceState(null,'',window.location.pathname+'#scan-qr');
  }
}
function attendanceRoute(data){
  if(!data||!data.shortCode)return'#scan-qr';
  return'#scan-qr?hadir='+encodeURIComponent(data.shortCode)+(data.via==='qr'?'&via=qr':'');
}
function bootstrapAttendanceQuery(){
  const query=new URLSearchParams(window.location.search);
  if(!query.has('hadir'))return;
  const pending=savePendingAttendance(query.get('hadir'),query.get('via')==='qr'?'qr':'');
  const cleanUrl=window.location.pathname+(pending?attendanceRoute(pending):'#scan-qr');
  window.history.replaceState(null,'',cleanUrl);
}
bootstrapAttendanceQuery();
async function api(action,params={},options={}){
  const body={action,...params};
  if(S.token)body.token=S.token;
  const request={method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(body)};
  if(options.signal)request.signal=options.signal;
  const res=await fetch(GAS_URL,request);
  const result=await res.json();
  if(!isPublicApiAction(action)&&!AUTH_EXPIRY_EXEMPT_ACTIONS.has(action)&&isSessionExpiredResponse(result)){
    handleExpiredSession();
    throw authExpiredError(result.message);
  }
  return result;
}
async function apiWithTimeout(action,params,timeoutMs){
  const controller=typeof AbortController==='function'?new AbortController():null;
  let timer;
  const timeout=new Promise(function(_resolve,reject){
    timer=setTimeout(function(){
      if(controller)controller.abort();
      const error=new Error('Permintaan tamat masa.');
      error.name='TimeoutError';
      reject(error);
    },timeoutMs);
  });
  try{
    return await Promise.race([api(action,params,controller?{signal:controller.signal}:{}),timeout]);
  }finally{
    clearTimeout(timer);
  }
}
function toast(msg,type='info',ms=3500){
  if(authExpiryHandling&&type==='danger')return;
  const c=document.getElementById('tc'),t=document.createElement('div');
  t.className='toast '+type;t.textContent=msg;c.appendChild(t);
  setTimeout(()=>t.remove(),ms);
}
function loading(v){document.getElementById('lo').style.display=v?'flex':'none'}
function setView(h){document.getElementById('app').innerHTML=h}
function $(id){return document.getElementById(id)}
function on(id,ev,fn){const el=$(id);if(el)el.addEventListener(ev,fn)}
function appVersionHtml(){return`<div class="app-version">v${APP_VERSION}</div>`}
async function checkAppVersion(){
  try{
    const res=await fetch('./version.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok)return;
    const info=await res.json();
    const next=(info.version||'').trim();
    if(!next||next===APP_VERSION)return;
    const key='spdk_update_dismissed_'+next;
    if(sessionStorage.getItem(key)==='1')return;
    showUpdatePopup(next,key);
  }catch(e){}
}
function showUpdatePopup(nextVersion,dismissKey){
  if(document.getElementById('update-popup'))return;
  const p=document.createElement('div');
  p.id='update-popup';
  p.className='update-card';
  p.innerHTML=`
    <div class="update-title">Kemaskini tersedia</div>
    <div class="update-msg">Versi baharu v${nextVersion} sudah tersedia. Reload untuk guna paparan terkini.</div>
    <div class="update-actions">
      <button class="btn btn-secondary btn-sm" id="update-later">Kemudian</button>
      <button class="btn btn-primary btn-sm" id="update-now">Reload Sekarang</button>
    </div>`;
  document.body.appendChild(p);
  document.getElementById('update-later').addEventListener('click',function(){
    sessionStorage.setItem(dismissKey,'1');
    p.remove();
  });
  document.getElementById('update-now').addEventListener('click',function(){
    const reload=function(){window.location.reload()};
    if(updateWorker){
      updateWorker.postMessage({type:'SKIP_WAITING'});
      setTimeout(reload,250);
      return;
    }
    if(navigator.serviceWorker&&navigator.serviceWorker.controller)navigator.serviceWorker.controller.postMessage({type:'SKIP_WAITING'});
    reload();
  });
}
function badge(s){
  const m={menunggu:'bm',lulus:'bl',tolak:'bt',batal:'bb',aktif:'ba',penuh:'bm'};
  const lb={menunggu:'Menunggu',lulus:'Lulus',tolak:'Ditolak',batal:'Dibatal',aktif:'Aktif',penuh:'Penuh'};
  return`<span class="badge ${m[s]||'bb'}">${lb[s]||s}</span>`;
}
const ROUTES={
  'login':{r:pgLogin,pub:true},'daftar':{r:pgDaftar,pub:true},
  'lupa-kata-laluan':{r:pgLupa,pub:true},'reset-password':{r:pgReset,pub:true},
  'dashboard':{r:pgDashboard},'katalog-kursus':{r:pgKatalog},
  'pendaftaran-saya':{r:pgPendaftaranSaya},'sijil-saya':{r:pgSijilSaya},'view-sijil':{r:pgViewSijil},
  'maklum-balas':{r:pgMaklumBalas},'profil-saya':{r:pgProfil},
  'tukar-kata-laluan':{r:pgTukarKL},
  'admin':{r:pgAdmin,role:['admin','superadmin']},
  'admin-kursus':{r:pgAdminKursus,role:['admin','superadmin']},
  'admin-pendaftaran':{r:pgAdminPend,role:['admin','superadmin']},
  'kehadiran':{r:pgKehadiran,role:['admin','superadmin']},
  'laporan':{r:pgLaporan,role:['admin','superadmin']},
  'surat-tawaran':{r:pgSuratTawaran,role:['admin','superadmin']},
  'superadmin-pengguna':{r:pgUrusPengguna,role:['superadmin']},
  'scan-qr':{r:pgScanQR,pub:true},'verify-cert':{r:pgVerifyCert,pub:true}
};
function goTo(h){window.location.hash='#'+h}
function router(){
  if(!authBootstrapDone)return;
  const rawHash=window.location.hash.replace('#','')||'login';
  const h=rawHash.split('?')[0];
  window._routeParams=new URLSearchParams(rawHash.split('?')[1]||'');
  const rt=ROUTES[h];
  if(!rt){goTo('login');return}
  if(rt.pub){
    if(S.token&&(h==='login'||h==='daftar')){
      const pending=getPendingAttendance();
      goTo(S.role==='peserta'&&pending?attendanceRoute(pending).slice(1):(S.role==='peserta'?'dashboard':'admin'));
      return;
    }
    rt.r(h);return;
  }
  if(!S.token){goTo('login');return}
  if(rt.role&&!rt.role.includes(S.role)){toast('Akses ditolak.','danger');goTo(S.role==='peserta'?'dashboard':'admin');return}
  rt.r(h);
}
window.addEventListener('hashchange',router);
window.addEventListener('load',function(){
  bootstrapAuth();
  checkAppVersion();
});
function showAuthBootstrapLoading(){
  setView(`<div class="auth-bg"><div class="auth-card" style="text-align:center">
    <div class="auth-logos"><img src="${L.L02}"></div>
    <div class="auth-title">Menyemak Sesi</div>
    <div class="auth-subtitle">Sila tunggu sebentar...</div>
    <div class="dots"><span></span><span></span><span></span><span></span></div>
    ${appVersionHtml()}
  </div></div>`);
}
function showAuthBootstrapFailure(){
  loading(false);
  setView(`<div class="auth-bg"><div class="auth-card" style="text-align:center">
    <div class="auth-logos"><img src="${L.L02}"></div>
    <div class="auth-title">Semakan Sesi Tergendala</div>
    <div class="alert ad">Tidak dapat menyemak sesi. Periksa sambungan internet dan cuba semula.</div>
    <button class="btn btn-primary btn-block" onclick="bootstrapAuth()">Cuba Semula</button>
    ${appVersionHtml()}
  </div></div>`);
}
async function bootstrapAuth(timeoutMs=15000){
  if(authBootstrapDone||authBootstrapInFlight)return;
  if(!S.token){
    authBootstrapDone=true;
    router();
    return;
  }
  authBootstrapInFlight=true;
  showAuthBootstrapLoading();
  try{
    const result=await apiWithTimeout('renewSession',{},timeoutMs);
    if(isSessionExpiredResponse(result)){
      handleExpiredSession();
      return;
    }
    if(!result||!result.success){
      showAuthBootstrapFailure();
      return;
    }
    saveAuth(result.token||S.token,result.role||S.role,result.nama||S.nama);
    authBootstrapDone=true;
    loading(false);
    router();
  }catch(error){
    showAuthBootstrapFailure();
  }finally{
    authBootstrapInFlight=false;
  }
}
function shell(title,active,body){
  const isA=['admin','superadmin'].includes(S.role);
  const isSA=S.role==='superadmin';
  const init=S.nama?S.nama[0].toUpperCase():'?';
  const pesertaLinks=[

function katalogDateOnly(value){
  if(!value)return'';
  var s=String(value).trim();
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{2})\/(\d{2})\/(\d{4})(?:\s|$)/);
  if(m)return m[3]+'-'+m[2]+'-'+m[1];
  var d=value instanceof Date?value:new Date(s);
  if(isNaN(d.getTime()))return'';
  var parts=new Intl.DateTimeFormat('en-US',{timeZone:'Asia/Kuala_Lumpur',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(d);
  var out={};parts.forEach(p=>{out[p.type]=p.value});
  return out.year+'-'+out.month+'-'+out.day;
}

function formatTarikhBm(value){
  var ymd=katalogDateOnly(value);
  if(!ymd)return String(value||'');
  var p=ymd.split('-');
  var bulan=['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
  return parseInt(p[2],10)+' '+bulan[parseInt(p[1],10)-1]+' '+p[0];
}

function formatJulatTarikhBm(mulaValue,tamatValue){
  var mula=katalogDateOnly(mulaValue);
  var tamat=katalogDateOnly(tamatValue);

  if(!mula&&!tamat)return'';
  if(!mula)return formatTarikhBm(tamatValue);
  if(!tamat)return formatTarikhBm(mulaValue);

  var a=mula.split('-');
  var b=tamat.split('-');
  var bulan=['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];

  var hariMula=parseInt(a[2],10);
  var hariTamat=parseInt(b[2],10);
  var bulanMula=parseInt(a[1],10);
  var bulanTamat=parseInt(b[1],10);

  if(a[0]===b[0]&&a[1]===b[1]){
    if(a[2]===b[2])return hariMula+' '+bulan[bulanMula-1]+' '+a[0];
    return hariMula+'–'+hariTamat+' '+bulan[bulanMula-1]+' '+a[0];
  }

  if(a[0]===b[0]){
    return hariMula+' '+bulan[bulanMula-1]+' – '+hariTamat+' '+bulan[bulanTamat-1]+' '+a[0];
  }

  return formatTarikhBm(mula)+' – '+formatTarikhBm(tamat);
}

function getKatalogRegistrationState(k,todayValue){
  var today=katalogDateOnly(todayValue||new Date());
  var mula=katalogDateOnly(k.tarikhMulaInput||k.tarikhMula);
  var tamat=katalogDateOnly(k.tarikhTamatInput||k.tarikhTamat);
  var buka=katalogDateOnly(k.tarikhMulaDaftarInput||k.tarikhMulaDaftar);
  var tutup=katalogDateOnly(k.tarikhTutupDaftarInput||k.tarikhTutupDaftar);
  var sedangBerlangsung=mula&&tamat&&today>=mula&&today<=tamat;
  var sudahTutup=tutup&&today>tutup;
  if(k.status==='penuh'){
    return{statusLabel:'Penuh',infoText:'Tiada tempat kosong buat masa ini.',buttonText:'Penuh',disabled:true};
  }
  if(sedangBerlangsung){
    return{statusLabel:'Sedang Berlangsung',infoText:sudahTutup?'Pendaftaran ditutup pada '+formatTarikhBm(tutup):'Kursus telah bermula.',buttonText:'Pendaftaran Ditutup',disabled:true};
  }
  if(sudahTutup){
    return{statusLabel:'Pendaftaran Ditutup',infoText:'Pendaftaran ditutup pada '+formatTarikhBm(tutup),buttonText:'Pendaftaran Ditutup',disabled:true};
  }
  if(buka&&today<buka){
    return{statusLabel:'Pendaftaran Belum Dibuka',infoText:'Pendaftaran dibuka pada '+formatTarikhBm(buka),buttonText:'Belum Dibuka',disabled:true};
  }
  if(k.status!=='aktif'||(mula&&today>=mula)){
    return{statusLabel:'Pendaftaran Ditutup',infoText:'',buttonText:'Pendaftaran Ditutup',disabled:true};
  }
  return{statusLabel:'Pendaftaran Dibuka',infoText:'',buttonText:'Daftar Sekarang',disabled:false};
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTarikhPanjang(yyyymmdd){
  if(!yyyymmdd)return'-';
  var p=yyyymmdd.split('-');
  if(p.length!==3)return yyyymmdd;
  var bln=['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
  return parseInt(p[2],10)+' '+bln[parseInt(p[1],10)-1]+' '+p[0];
}
function formatTarikhPaparan(dateStr){
  if(!dateStr)return'';
  var s=String(dateStr).trim();
  if(!s)return'';
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;
  var m=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return m[3]+'/'+m[2]+'/'+m[1];
  return s;
}
function formatNoKpDisplay(value){
  var raw=String(value||'').trim();
  var digits=raw.replace(/\D/g,'');
  if(digits.length===12)return digits.substr(0,6)+'-'+digits.substr(6,2)+'-'+digits.substr(8,4);
  return raw;
}

  const js=s=>String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const aktif=soalan.filter(q=>q.status==='aktif');
  _mbAdminSoalanList=aktif;
  const editSoalan=aktif.find(q=>q.questionId===_mbEditQuestionId);
  const aktifCount=aktif.length;
  const atHad=aktifCount>=20;
  const isEdit=!!editSoalan;
  const formTitle=isEdit?'Kemaskini Soalan':'+ Tambah Soalan';
  const formSoalan=isEdit?editSoalan.soalan:'';
  const formUrutan=isEdit?(editSoalan.urutan||1):(aktifCount+1);
  const formJenis=isEdit?(editSoalan.jenisSoalan||'rating'):'rating';

  const listHtml=aktif.length?aktif.map(q=>`
    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
      <span style="min-width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0">${q.urutan}</span>
      <span style="flex:1;font-size:14px">${esc(q.soalan)}</span>
      <span class="badge ${q.jenisSoalan==='teks'?'bb':'bl'}" style="font-size:11px;flex-shrink:0">${q.jenisSoalan==='teks'?'Teks':'Rating'}</span>
      <button class="btn btn-secondary btn-sm" onclick="mbAdminEditSoalan('${js(q.questionId)}','${js(courseId)}')" title="Edit soalan">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="mbAdminPadamSoalan('${js(q.questionId)}','${js(courseId)}')" title="Padam soalan">🗑</button>
    </div>`).join(''):'<div style="padding:8px 0;color:var(--muted)">Tiada soalan penilaian untuk kursus ini lagi.</div>';

  const formHtml=atHad&&!isEdit
    ?`<div class="alert aw" style="margin-top:12px">Had maksimum 20 soalan aktif telah dicapai untuk kursus ini.</div>`
    :`<div class="card" style="margin-top:16px">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px">${formTitle}</div>
        <div class="fg">
          <label>Teks Soalan <span id="mb-sc" style="font-weight:400;color:var(--muted)">0/200</span></label>
          <textarea id="mb-soalan-input" rows="3" maxlength="200" placeholder="Masukkan teks soalan..." oninput="$('mb-sc').textContent=this.value.length+'/200'">${esc(formSoalan)}</textarea>
        </div>
        <div class="fg" style="max-width:160px">
          <label>Urutan</label>
          <input type="number" id="mb-urutan-input" min="1" max="20" value="${formUrutan}">
        </div>
        <div class="fg" style="max-width:200px">
          <label>Jenis Soalan</label>
          <select id="mb-jenis-input">
            <option value="rating" ${formJenis==='rating'?'selected':''}>Penilaian Bintang (1-5)</option>
            <option value="teks" ${formJenis==='teks'?'selected':''}>Jawapan Teks Bebas</option>
          </select>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="mbAdminSimpanSoalan('${js(courseId)}')">${isEdit?'Simpan Perubahan':'Tambah Soalan'}</button>
          ${isEdit?`<button class="btn btn-secondary" onclick="mbAdminBatalEditSoalan('${js(courseId)}')">Batal Edit</button>`:''}
        </div>
      </div>`;

  el.innerHTML=`
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:15px;font-weight:700">${aktifCount}/20 soalan aktif</span>
      </div>
      ${listHtml}
    </div>
    ${formHtml}`;
  if($('mb-sc'))$('mb-sc').textContent=String(formSoalan||'').length+'/200';
}

function mbAdminEditSoalan(questionId,courseId){
  _mbEditQuestionId=questionId;
  mbAdminRenderSoalan(_mbAdminSoalanList,courseId);
  const form=$('mb-soalan-input');
  if(form)form.focus();
}

function mbAdminBatalEditSoalan(courseId){
  _mbEditQuestionId='';
  mbAdminRenderSoalan(_mbAdminSoalanList,courseId);
}

async function mbAdminPadamSoalan(questionId,courseId){
  if(!confirm('Padam soalan ini? Tindakan ini tidak boleh diundur.'))return;
  loading(true);
  try{
    const r=await api('padamSoalan',{questionId});
    toast(r.success?'Soalan berjaya dipadam.':(r.message||'Gagal padam.'),r.success?'success':'danger');
    if(r.success)mbAdminLoadSoalan(courseId);
  }catch(e){toast('Ralat sistem.','danger')}
  loading(false);
}

async function mbAdminTambahSoalan(courseId){
  const soalanEl=$('mb-soalan-input');
  const urutanEl=$('mb-urutan-input');
  const jenisEl=$('mb-jenis-input');
  const soalan=(soalanEl?.value||'').trim();
  const urutan=parseInt(urutanEl?.value,10);
  const jenisSoalan=jenisEl?.value||'rating';
  if(!soalan){toast('Teks soalan tidak boleh kosong.','warning');return}
  if(soalan.length>200){toast('Soalan tidak boleh melebihi 200 aksara.','warning');return}
  if(isNaN(urutan)||urutan<1||urutan>20){toast('Urutan mestilah nombor 1 hingga 20.','warning');return}
  if(!['rating','teks'].includes(jenisSoalan)){toast('Jenis soalan tidak sah.','warning');return}
  loading(true);
  try{
    const r=await api('tambahSoalan',{courseId,soalan,urutan,jenisSoalan});
    toast(r.success?'Soalan berjaya ditambah.':(r.message||'Gagal.'),r.success?'success':'danger');
    if(r.success)mbAdminLoadSoalan(courseId);
  }catch(e){toast('Ralat sistem.','danger')}
  loading(false);
}

function mbAdminSimpanSoalan(courseId){
  if(_mbEditQuestionId)return mbAdminKemaskiniSoalan(courseId);
  return mbAdminTambahSoalan(courseId);
}

async function mbAdminKemaskiniSoalan(courseId){
  const soalanEl=$('mb-soalan-input');
  const urutanEl=$('mb-urutan-input');
  const jenisEl=$('mb-jenis-input');
  const soalan=(soalanEl?.value||'').trim();
  const urutan=parseInt(urutanEl?.value,10);
  const jenisSoalan=jenisEl?.value||'rating';
  if(!soalan){toast('Teks soalan tidak boleh kosong.','warning');return}
  if(soalan.length>200){toast('Soalan tidak boleh melebihi 200 aksara.','warning');return}
  if(isNaN(urutan)||urutan<1||urutan>20){toast('Urutan mestilah nombor 1 hingga 20.','warning');return}
  if(!['rating','teks'].includes(jenisSoalan)){toast('Jenis soalan tidak sah.','warning');return}
  loading(true);
  try{
    const r=await api('kemaskinSoalan',{courseId,questionId:_mbEditQuestionId,soalan,urutan,jenisSoalan});
    toast(r.success?'Soalan berjaya dikemaskini.':(r.message||'Gagal kemaskini.'),r.success?'success':'danger');
    if(r.success){
      _mbEditQuestionId='';
      mbAdminLoadSoalan(courseId);
    }
  }catch(e){toast('Ralat sistem.','danger')}
  loading(false);
}

async function mbAdminLoadStatus(courseId){
  const el=$('mb-panel-status');
  if(!el)return;
  el.innerHTML='<div class="alert ai">Memuatkan status peserta...</div>';
  try{
    const r=await api('getStatusPesertaMaklumBalas',{courseId});
    if(!r.success){el.innerHTML=`<div class="alert ad">${r.message||'Ralat.'}</div>`;return}
    _mbStatusCache=r.peserta||[];
    mbAdminRenderStatus('');
  }catch(e){el.innerHTML='<div class="alert ad">Ralat sistem.</div>'}
}

function mbAdminRenderStatus(cari){
  const el=$('mb-panel-status');
  if(!el)return;
  const q=(cari||'').toLowerCase().trim();
  const rows=q?_mbStatusCache.filter(x=>(x.nama||'').toLowerCase().includes(q)):_mbStatusCache;
  el.innerHTML=`
    <div class="card" style="margin-bottom:12px">
      <input type="text" id="mb-status-cari" placeholder="🔍 Cari nama peserta..." oninput="mbAdminFilterStatus()">
    </div>
    ${rows.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr>
      <th style="width:40px">No.</th><th>Nama</th><th>Maklum Balas</th><th>Sijil</th>
    </tr></thead><tbody>
      ${rows.map((x,i)=>`<tr>
        <td style="color:var(--muted)">${i+1}</td>
        <td>${x.nama||'-'}</td>
        <td>${x.sudahHantar?'<span class="badge bl">✓ Sudah Hantar</span>':'<span class="badge bb">✗ Belum Hantar</span>'}</td>
        <td>${x.adaSijil?'<span class="badge bl">✓ Ada</span>':'<span style="color:var(--muted)">—</span>'}</td>
      </tr>`).join('')}
    </tbody></table></div>`:'<div class="alert ai">Tiada peserta berdaftar untuk kursus ini.</div>'}`;
  const inp=$('mb-status-cari');
  if(inp){
    inp.value=cari||'';
    inp.focus();
    inp.setSelectionRange(inp.value.length,inp.value.length);
  }
}

function mbAdminFilterStatus(){
  const cari=($('mb-status-cari')||{}).value||'';
  mbAdminRenderStatus(cari);
}

    $('mkl').value=k.tempat||'';
    $('mkhp').value=k.hadPeserta==null?'':k.hadPeserta;
  }

async function saveKursus(idx){
  const editMode=Number.isInteger(idx);
  const k=editMode?kuKursusRows[idx]:null;
  const namaKursus=$('mkn').value.trim();
  const penerangan=$('mkp').value.trim();
  const tarikhMula=$('mkm').value;
  const tarikhTamat=$('mkt').value;
  const masaMula=$('mkmm').value;
  const masaTamat=$('mkmt').value;
  const tempat=$('mkl').value.trim();
  const hadPeserta=$('mkhp').value.trim();
  if(!namaKursus||!penerangan||!tarikhMula||!tarikhTamat||!masaMula||!masaTamat||!tempat){
    $('mka').innerHTML='<div class="alert ad">Sila isi semua medan bertanda wajib.</div>';
    return;
  }
  if(hadPeserta&&!/^\d+$/.test(hadPeserta)){
    $('mka').innerHTML='<div class="alert ad">Had peserta mesti nombor bulat positif.</div>';
    return;
  }
  if(hadPeserta&&Number(hadPeserta)<1){
    $('mka').innerHTML='<div class="alert ad">Had peserta mesti nombor bulat positif.</div>';
    return;
  }
  if(hadPeserta&&Number(hadPeserta)>10000){
    $('mka').innerHTML='<div class="alert ad">Had peserta tidak boleh melebihi 10000.</div>';
    return;
  }
  const btn=$('mk-btn-save');
  btn.disabled=true; loading(true);
  try{
    const payload={
      namaKursus, penerangan, tarikhMula, tarikhTamat,
      masaMula, masaTamat, tempat, hadPeserta,
      tarikhMulaDaftar:$('mkrd').value, tarikhTutupDaftar:$('mktd').value
    };
    if(editMode)payload.courseId=k.courseId;
    const r=await api(editMode?'kemaskinikursus':'ciptaKursus',payload);
    if(r.success){toast(editMode?'Kursus berjaya dikemaskini.':'Kursus berjaya ditambah.','success');document.getElementById('mk').remove();loadKursus()}
    else $('mka').innerHTML=`<div class="alert ad">${r.message||'Gagal.'}</div>`;

function apPopulateKursusFilter(){

function apUpdateCounts(){

function apGetPesertaAssignVisible(){

  const gred=(($('ap-filter-assign-gred')||{}).value||'');
  return apPesertaBelumDaftar.map((p,i)=>({p,i})).filter(x=>{
    const p=x.p;

    const matchJawatan=!jawatan||(p.jawatan||'')===jawatan;
    const matchGred=!gred||(p.gred||'')===gred;
    return matchNama&&matchJawatan&&matchGred;

function apToggleSemua(chk){

function khGenerateHari(tarikhMula,tarikhTamat){
  const hasil=[];
  let d=new Date(tarikhMula+'T00:00:00');
  const end=new Date(tarikhTamat+'T00:00:00');
  let h=1;
  while(d<=end&&h<=30){
    const ymd=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    hasil.push({hari:String(h),tarikh:ymd});
    d.setDate(d.getDate()+1); h++;
  }
  return hasil;
}

function formatTarikhKH(ymd){
  if(!ymd)return '-';
  const p=ymd.split('-'); if(p.length!==3)return ymd;
  const bln=['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
  return parseInt(p[2],10)+' '+bln[parseInt(p[1],10)-1]+' '+p[0];
}
function khYmdToDDMMYYYY(ymd){
  const p=ymd.split('-'); return p.length===3?(p[2]+'/'+p[1]+'/'+p[0]):ymd;
}
function khDDMMYYYYtoYMD(s){
  const p=s.split('/'); return p.length===3?(p[2]+'-'+p[1]+'-'+p[0]):s;
}

function khOnKursusChange(){

  if(!courseId)return;
  const k=khKursusData.find(x=>x.courseId===courseId);
  if(!k)return;
  const hariList=khGenerateHari(k.tarikhMula,k.tarikhTamat);
  if(hariList.length===1){
    khHariTerpilih=hariList[0];
    khLoadPeserta(courseId,khHariTerpilih.hari);

async function khLoadPeserta(courseId,hari){
  $('khc').innerHTML='<div class="alert ai">Memuatkan senarai peserta...</div>';

    khRenderPeserta();

function khRenderPeserta(){
  if(!khPesertaData.length){$('khc').innerHTML='<div class="alert ai">Tiada peserta berstatus "lulus" untuk kursus ini.</div>';return}
  const hadir=khPesertaData.filter(p=>p.hadir).length;
  $('khc').innerHTML=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <span style="font-size:13px;font-weight:600">Senarai Peserta (${khPesertaData.length} orang)</span>
      <span style="font-size:12px;color:var(--muted)"><strong id="kh-hadir-count">${hadir}</strong> / ${khPesertaData.length} hadir</span>
    </div>
    <div class="tw"><table><thead><tr>
      <th style="width:40px">Bil</th><th>Nama</th><th>Jawatan / Bahagian</th>
      <th style="width:50px;text-align:center"><input type="checkbox" id="kh-chk-semua" onchange="khToggleSemua(this)"></th>
    </tr></thead><tbody>
    ${khPesertaData.map((p,i)=>`<tr>
      <td style="color:var(--muted);font-size:12px">${i+1}</td>
      <td>${p.nama}</td>
      <td style="font-size:12px;color:var(--muted)">${p.jawatan}<br>${p.bahagian}</td>
      <td style="text-align:center"><input type="checkbox" class="kh-chk" data-idx="${i}" ${p.hadir?'checked':''} onchange="khOnCheckChange(this)"></td>
    </tr>`).join('')}
    </tbody></table></div>
    <div style="margin-top:12px;display:flex;justify-content:flex-end">
      <button class="btn btn-primary" id="kh-btn-simpan" onclick="khSimpanKehadiran()">Simpan Kehadiran</button>
    </div>
  </div>`;

function khToggleSemua(chk){
  document.querySelectorAll('.kh-chk').forEach(c=>{c.checked=chk.checked;khPesertaData[parseInt(c.dataset.idx)].hadir=chk.checked});
  khUpdateRingkasan();
}
function khOnCheckChange(chk){
  khPesertaData[parseInt(chk.dataset.idx)].hadir=chk.checked;
  khSyncPilihSemua();
  khUpdateRingkasan();
}
function khSyncPilihSemua(){
  const all=$('kh-chk-semua'); if(!all)return;
  const chks=document.querySelectorAll('.kh-chk');
  const semua=Array.prototype.every.call(chks,c=>c.checked);
  all.checked=semua;
  all.indeterminate=!semua&&Array.prototype.some.call(chks,c=>c.checked);
}
function khUpdateRingkasan(){
  const hadir=khPesertaData.filter(p=>p.hadir).length;

async function khSimpanKehadiran(){
  if(!khPesertaData.length||!khHariTerpilih)return;
  const courseId=$('kh-sel').value;
  if(!courseId)return;
  const btn=$('kh-btn-simpan');
  btn.disabled=true; btn.textContent='Menyimpan...';
  const rekods=khPesertaData.map(p=>({regId:p.regId,userId:p.userId,hadir:p.hadir}));
  try{
    const r=await api('rekodKehadiran',{courseId,hari:khHariTerpilih.hari,tarikhHadir:khHariTerpilih.tarikh,rekods});
    toast(r.message||(r.success?'Berjaya.':'Gagal.'),r.success?'success':'danger');
    if(r.success)await khLoadPeserta(courseId,khHariTerpilih.hari);
  }catch(e){toast('Ralat sambungan.','danger')}
  const btnSemasa=$('kh-btn-simpan');
  if(btnSemasa){btnSemasa.disabled=false;btnSemasa.textContent='Simpan Kehadiran'}
}

  const tarikhDDMMYYYY=khYmdToDDMMYYYY(tarikhYMD);
  try{
    const r=await api('getStatusQR',{courseId,hari});
    khRenderQR(r,courseId,hari,tarikhYMD,tarikhDDMMYYYY);
  }catch(e){$('kh-qr').innerHTML='<div class="card"><div class="alert ad" style="margin:0">Ralat menyemak status QR.</div></div>'}
}

function khRenderQR(r,courseId,hari,tarikhYMD,tarikhDDMMYYYY){

  const label=`Hari ${hari} — ${tarikhPapar}`;
  khQrActionState={courseId,hari,tarikhYMD,tarikhDDMMYYYY,tarikhPapar,qrUrl:'',attendanceUrl:''};
  if(!r||!r.success){
    $('kh-qr').innerHTML=`<div class="card" style="margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:8px">QR Code Kehadiran</div>
      <div class="alert ad" style="margin:0">${escHtml(r&&r.message?r.message:'Ralat menyemak status QR.')}</div>
    </div>`;
  }else if(!r.exists){
    $('kh-qr').innerHTML=`<div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">QR Code Kehadiran</span>
        <span style="font-size:12px;color:var(--muted)">${escHtml(label)}</span>
      </div>
      <div class="alert ai" style="margin-bottom:8px">Tiada QR untuk sesi ini. Jana QR Code supaya peserta boleh scan kehadiran.</div>
      <button class="btn btn-primary" id="kh-btn-jana">Jana QR Code</button>
    </div>`;
    $('kh-btn-jana').addEventListener('click',()=>khJanaQR(courseId,hari,tarikhDDMMYYYY));
  }else{

    const qrUrl=khSafeQrUrl(r.qrUrl);
    khQrActionState.qrUrl=qrUrl;
    khQrActionState.attendanceUrl=attendanceUrl;

function khSafeAttendanceUrl(value){
  try{
    const u=new URL(String(value||''));
    const path=u.pathname.replace(/\/+$/,'');
    const code=normalizeAttendanceCode(u.searchParams.get('hadir'));
    if(u.protocol!=='https:'||u.origin!=='https://kursusitu.github.io'||path!=='/spdk'||
       !/^[ABCDEFGHJKMNPQRSTUVWXYZ23456789]{6}$/.test(code))return'';
    return u.href;
  }catch(e){return''}
}
function khSafeQrUrl(value){
  try{
    const u=new URL(String(value||''));
    return u.protocol==='https:'&&u.hostname==='api.qrserver.com'?u.href:'';
  }catch(e){return''}
}
async function khSalinPautan(){
  const url=khQrActionState&&khQrActionState.attendanceUrl;
  if(!url)return;
  try{
    if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(url);
    else{
      const ta=document.createElement('textarea');
      ta.value=url;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();
      const copied=document.execCommand('copy');
      document.body.removeChild(ta);
      if(!copied)throw new Error('copy failed');
    }
    toast('Pautan kehadiran disalin.','success');
  }catch(e){toast('Pautan tidak dapat disalin. Sila salin secara manual.','warning')}
}
function khKongsiWhatsApp(){
  const state=khQrActionState;
  if(!state||!state.attendanceUrl)return;
  const kursus=khKursusData.find(x=>x.courseId===state.courseId);
  const namaKursus=kursus&&kursus.namaKursus?kursus.namaKursus:'Kursus SPDK';
  const mesej='Kehadiran '+namaKursus+'\nHari '+state.hari+' — '+state.tarikhPapar+
    '\n\nSila rekod kehadiran melalui pautan berikut:\n'+state.attendanceUrl+
    '\n\nLog masuk menggunakan akaun SPDK sendiri.';
  const w=window.open('https://wa.me/?text='+encodeURIComponent(mesej),'_blank','noopener');
  if(w)w.opener=null;
}
function khBukaPautan(){
  const url=khQrActionState&&khQrActionState.attendanceUrl;
  if(!url)return;
  const w=window.open(url,'_blank','noopener');
  if(w)w.opener=null;
}

async function khJanaQR(courseId,hari,tarikhDDMMYYYY){
  const btn=$('kh-btn-jana');
  if(btn){btn.disabled=true;btn.textContent='Menjana...'}
  try{
    const r=await api('getQRCode',{courseId,hari,tarikhKursus:tarikhDDMMYYYY});
    if(r.success){khRenderQR(r,courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY),tarikhDDMMYYYY);toast('QR Code berjaya dijana.','success')}
    else{if(btn){btn.disabled=false;btn.textContent='Jana QR Code'}toast(r.message||'Ralat menjana QR.','danger')}
  }catch(e){if(btn){btn.disabled=false;btn.textContent='Jana QR Code'}toast('Ralat sistem.','danger')}
}

function khJanaQRSemula(courseId,hari,tarikhDDMMYYYY){
  if(!confirm('QR lama akan tidak sah serta-merta. Peserta yang belum scan perlu guna QR baru ini.\n\nTeruskan jana QR Code baharu?'))return;
  khJanaQRSemulaKonfirm(courseId,hari,tarikhDDMMYYYY);
}

async function khJanaQRSemulaKonfirm(courseId,hari,tarikhDDMMYYYY){
  $('kh-qr').innerHTML='<div class="card"><div class="alert ai" style="margin:0">Menjana QR baharu...</div></div>';
  try{
    const r=await api('janaQRCodeBaharu',{courseId,hari,tarikhKursus:tarikhDDMMYYYY});
    if(r.success){khRenderQR(r,courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY),tarikhDDMMYYYY);toast('QR Code baharu berjaya dijana.','success')}
    else{toast(r.message||'Ralat menjana QR.','danger');khLoadQR(courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY))}
  }catch(e){toast('Ralat sistem.','danger');khLoadQR(courseId,hari,khDDMMYYYYtoYMD(tarikhDDMMYYYY))}
}

function khMuatTurunQR(qrUrl){
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    const canvas=document.createElement('canvas');
    canvas.width=img.width; canvas.height=img.height;
    canvas.getContext('2d').drawImage(img,0,0);
    const a=document.createElement('a');
    a.href=canvas.toDataURL('image/png');
    a.download='QR_Kehadiran_Hari'+(khHariTerpilih?khHariTerpilih.hari:'')+'.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  img.onerror=function(){
    const a=document.createElement('a');
    a.href=qrUrl; a.target='_blank';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };
  img.src=qrUrl;
}

async function loadSuratTawaran(courseId){
  if(!courseId){$('stc').innerHTML='';return}
  stReferenceSelectionKey='__reset__';
  $('stc').innerHTML='<div class="alert ai">Memuatkan...</div>';
  try{
    const r=await api('getSenaraiTawaran',{courseId});
    if(!r.success){$('stc').innerHTML='<div class="alert ad">'+escHtml(r.message||'Gagal memuatkan peserta.')+'</div>';return}
    stPesertaData=r.peserta||[];
    if(!stPesertaData.length){$('stc').innerHTML='<div class="alert ai">Tiada peserta berstatus Lulus untuk kursus ini.</div>';return}
    const sr=await api('getStatusSuratTawaran',{courseId,regIds:stPesertaData.map(p=>p.regId)});
    if(!sr.success){
      $('stc').innerHTML='<div class="alert ad">'+escHtml(sr.message||'Status penghantaran tidak dapat dimuatkan.')+'</div>';
      return;
    }
    stStatusMap={};
    (sr.statuses||[]).forEach(x=>stStatusMap[x.regId]=x);
    stStatusFilter='belum_dihantar';
    stSelectedMap={};
    stPesertaData.forEach(p=>stSelectedMap[p.regId]=false);
    stRenderPeserta(courseId);
  }catch(e){$('stc').innerHTML='<div class="alert ad">Ralat memuatkan peserta atau status penghantaran.</div>'}
}

function stStatusMatches(code){
  if(stStatusFilter==='semua')return true;
  if(stStatusFilter==='dihantar')return code==='dihantar'||code==='dihantar_semula';
  return code===stStatusFilter;

function stToggleSemua(chk){
  document.querySelectorAll('.st-chk').forEach(c=>c.checked=chk.checked);
  stKemaskiniPilihan();
}
function stPilihSemua(val){
  if(!val){
    stPesertaData.forEach(p=>stSelectedMap[p.regId]=false);
  }
  document.querySelectorAll('.st-chk').forEach(c=>{
    c.checked=val;
    const p=stPesertaData[parseInt(c.dataset.idx,10)];
    if(p)stSelectedMap[p.regId]=val;
  });
  const all=$('st-chk-semua'); if(all)all.checked=val;
  stKemaskiniPilihan();
}
function stKemaskiniPilihan(){
  const checks=document.querySelectorAll('.st-chk');
  let dipilihVisible=0; checks.forEach(c=>{const p=stPesertaData[parseInt(c.dataset.idx,10)];if(p)stSelectedMap[p.regId]=c.checked;if(c.checked)dipilihVisible++});
  const dipilih=stPesertaData.filter(p=>stSelectedMap[p.regId]).length;
  const bilEl=$('st-bil-dipilih'); if(bilEl)bilEl.textContent=dipilih;
  const all=$('st-chk-semua');
  if(all){all.indeterminate=(dipilihVisible>0&&dipilihVisible<checks.length);all.checked=(dipilihVisible===checks.length&&checks.length>0)}
  stUpdateReferenceMode();
}

function stRememberNewReference(){
  if(stReferenceMode!=='new')return;
  stReferenceNewDraft.noRujukan=$('st-rujukan').value;
  stReferenceNewDraft.tarikhSurat=$('st-tarikh').value;
}
function stDateInputFromStatus(value){
  const raw=String(value||'').trim(),iso=raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(iso)return raw;
  const numeric=raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);if(numeric)return numeric[3]+'-'+String(numeric[2]).padStart(2,'0')+'-'+String(numeric[1]).padStart(2,'0');
  const bm=raw.match(/^(\d{1,2})\s+([A-Za-z]+)\s+(\d{4})$/);if(!bm)return '';
  const months={januari:1,februari:2,mac:3,april:4,mei:5,jun:6,julai:7,ogos:8,september:9,oktober:10,november:11,disember:12},month=months[bm[2].toLowerCase()];
  return month?bm[3]+'-'+String(month).padStart(2,'0')+'-'+String(bm[1]).padStart(2,'0'):'';
}
function stSetReferenceMode(mode){
  const original=$('st-reference-original');
  if(mode==='original'&&original.disabled)return;
  if(stReferenceMode==='new')stRememberNewReference();
  stReferenceMode=mode;
  original.checked=mode==='original';$('st-reference-new').checked=mode==='new';
  if(mode==='original'){
    $('st-rujukan').value=stReferenceContext.originalReference;$('st-tarikh').value=stReferenceContext.originalDate;
    $('st-rujukan').readOnly=true;$('st-tarikh').readOnly=true;
    $('st-reference-note').innerHTML='Menggunakan rujukan asal: <strong>'+escHtml(stReferenceContext.originalReference)+'</strong><br>Tarikh surat asal: <strong>'+escHtml(formatTarikhPaparan(stReferenceContext.originalDate))+'</strong>';
  }else{
    $('st-rujukan').value=stReferenceNewDraft.noRujukan;$('st-tarikh').value=stReferenceNewDraft.tarikhSurat;
    $('st-rujukan').readOnly=false;$('st-tarikh').readOnly=false;
    if(stReferenceContext.type==='resend')$('st-reference-note').textContent='Masukkan rujukan dan tarikh surat baharu untuk penghantaran semula ini.';
  }
}
function stUpdateReferenceMode(){
  const selected=stPesertaData.filter(p=>stSelectedMap[p.regId]);
  const key=selected.map(p=>p.regId).sort().join('|');if(key===stReferenceSelectionKey)return;stReferenceSelectionKey=key;
  const panel=$('st-reference-panel'),note=$('st-reference-note'),original=$('st-reference-original');
  const sent=selected.filter(p=>stGetStatus(p.regId).successfulSendCount>0),unsent=selected.length-sent.length;
  stReferenceContext={type:'new',originalReference:'',originalDate:''};
  if(!selected.length||!sent.length){panel.style.display='none';original.disabled=true;stSetReferenceMode('new');return}
  panel.style.display='block';
  if(unsent>0){stReferenceContext.type='mixed';original.disabled=true;note.style.color='#b45309';note.textContent='Batch ini mengandungi peserta baharu dan peserta yang pernah menerima surat. Sila gunakan satu rujukan baharu untuk semua surat.';stSetReferenceMode('new');return}
  const refs={},dates=[];let missing=false;
  sent.forEach(p=>{const s=stGetStatus(p.regId),ref=String(s.lastReferenceNo||'').trim(),date=stDateInputFromStatus(s.lastLetterDate);if(!ref||!date)missing=true;if(ref)refs[ref]=true;if(date)dates.push(date)});
  const list=Object.keys(refs);
  if(missing||list.length!==1){original.disabled=true;note.style.color='#b45309';note.textContent=missing?'Maklumat rujukan atau tarikh asal tidak lengkap. Sila gunakan rujukan baharu.':'Peserta terpilih mempunyai rujukan asal yang berbeza. Sila gunakan rujukan baharu.';stSetReferenceMode('new');return}
  note.style.color='#475569';stReferenceContext={type:'resend',originalReference:list[0],originalDate:dates[0]};original.disabled=false;stSetReferenceMode('original');
}

async function stHantar(courseId){
  if(!courseId){toast('Pilih kursus dahulu.','warning');return}
  const templateHtml=$('st-editor').innerHTML.trim();
  if(!templateHtml){toast('Kandungan surat tidak boleh kosong.','warning');return}

  const regIds=[];
  stPesertaData.forEach(p=>{if(stSelectedMap[p.regId])regIds.push(p.regId)});
  if(!regIds.length){toast('Pilih sekurang-kurangnya seorang peserta.','warning');return}

  const noRujukan=$('st-rujukan').value.trim();
  if(!noRujukan){toast('Sila isi No. Rujukan Surat.','warning');return}
  const tarikhSurat=$('st-tarikh').value;
  if(!tarikhSurat){toast('Sila pilih Tarikh Surat.','warning');return}

  const btn=$('st-btn-hantar');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></span> Menghantar...';
  loading(true);

  try{
    const r=await api('hantarSuratTawaran',{
      courseId, regIds, templateHtml,
      noTel:$('st-tel').value.trim(), noFaks:$('st-faks').value.trim(),
      emelOrg:$('st-emel').value.trim(), noRujukan,
      tarikhSurat,
      includeLampiranA:true
    });
    if(!r.success){toast(r.message||'Ralat menghantar.','danger');return}
    const k=r.keputusan||[];
    const msg=r.jumlahBerjaya+' daripada '+r.jumlah+' surat berjaya dihantar.';
    toast(msg, r.jumlahBerjaya===r.jumlah?'success':(r.jumlahBerjaya===0?'danger':'warning'));
    $('st-results').innerHTML=`<div class="tw"><table><thead><tr><th>Nama</th><th>Status</th><th>Maklumat</th></tr></thead><tbody>
      ${k.map(x=>`<tr><td>${x.nama}</td><td>${x.status==='berjaya'?'<span class="badge bl">Berjaya</span>':'<span class="badge bt">Gagal</span>'}</td><td style="font-size:12px;color:var(--muted)">${x.error||''}</td></tr>`).join('')}
    </tbody></table></div>`;
    await stRefreshStatus(courseId,regIds);
  }catch(e){toast('Ralat sambungan.','danger')}
  loading(false);
  btn.disabled=false;
  btn.innerHTML='Kemaskini &amp; Hantar Surat';
}
async function stRefreshStatus(courseId,sentRegIds){
  const sr=await api('getStatusSuratTawaran',{courseId,regIds:stPesertaData.map(p=>p.regId)});
  if(!sr.success){toast(sr.message||'Status penghantaran tidak dapat dikemas kini.','warning');return}
  stStatusMap={};(sr.statuses||[]).forEach(x=>stStatusMap[x.regId]=x);
  (sentRegIds||[]).forEach(id=>stSelectedMap[id]=false);
  stRenderPeserta(courseId);
}

function upPopulateGred(){

}

async function aktifkanUser(id,nama){
  if(!confirm(`Aktifkan semula akaun "${nama}"?`))return;

    if(r.success)loadPengguna();
  }catch(e){toast('Ralat.','danger')}
  loading(false);
}

/* AWAM */
function pgScanQR(){
  const params=new URLSearchParams(window.location.hash.split('?')[1]||'');
  const routeCode=normalizeAttendanceCode(params.get('hadir'));
  const routeVia=params.get('via')==='qr'?'qr':'';
  const courseId=params.get('courseId')||'';
  const hari=params.get('hari')||'';
  const tarikh=params.get('tarikh')||'';
  const legacyToken=courseId&&hari?courseId+'|'+hari+'|'+tarikh:'';
  const pending=routeCode?savePendingAttendance(routeCode,routeVia):(legacyToken?null:getPendingAttendance());
  const shortCode=pending?pending.shortCode:'';
  const via=pending?pending.via:'';
  const bukanPeserta=S.token&&S.role!=='peserta';
  setView(`<div class="auth-bg"><div class="auth-card">
    <div class="auth-logos"><img src="${L.L02}"></div>
    <div class="auth-title">Pautan Kehadiran</div>
    <div class="auth-subtitle">${shortCode?'Kod pendek: '+escHtml(shortCode):(tarikh?'Hari '+escHtml(hari)+' — '+escHtml(tarikh):'Masukkan kod pendek atau token QR legacy')}</div>
    <div id="qra">${bukanPeserta?'<div class="alert ad">Pautan kehadiran hanya boleh digunakan oleh peserta. Sila gunakan akaun peserta.</div>':''}</div>
    <div class="fg"><label>Kod Pendek / Token Legacy</label><input id="qrk" value="${escHtml(shortCode||legacyToken)}" placeholder="Contoh: AB7K9X atau CourseID|Hari|Tarikh"></div>
    <button class="btn btn-primary btn-block" id="qr-submit" ${bukanPeserta?'disabled':''}>${S.token?'Rekod Kehadiran':'Log Masuk untuk Rekod'}</button>
    ${appVersionHtml()}
  </div></div>`);
  const btn=$('qr-submit');
  if(btn&&!bukanPeserta)btn.addEventListener('click',doScanQR);
  if(shortCode&&S.token&&S.role==='peserta'&&/^[ABCDEFGHJKMNPQRSTUVWXYZ23456789]{6}$/.test(shortCode)){
    const autoKey=shortCode+'|'+via;
    if(sessionStorage.getItem(ATTENDANCE_AUTO_KEY)!==autoKey){
      sessionStorage.setItem(ATTENDANCE_AUTO_KEY,autoKey);
      setTimeout(doScanQR,300);
    }
  }else if(legacyToken&&S.token&&S.role==='peserta')setTimeout(doScanQR,500);
}
async function doScanQR(){
  const k=$('qrk').value.trim();
  if(!k){$('qra').innerHTML='<div class="alert ad">Sila masukkan kod QR.</div>';return}
  if(S.token&&S.role!=='peserta'){
    $('qra').innerHTML='<div class="alert ad">Pautan kehadiran hanya boleh digunakan oleh peserta.</div>';
    return;
  }
  const normalized=normalizeAttendanceCode(k);
  const isShortCode=/^[ABCDEFGHJKMNPQRSTUVWXYZ23456789]{6}$/.test(normalized);
  const legacyParts=k.split('|').map(x=>x.trim());
  const isLegacy=legacyParts.length===3&&legacyParts[0]&&/^\d+$/.test(legacyParts[1])&&parseInt(legacyParts[1],10)>0&&legacyParts[2];
  if(!isShortCode&&!isLegacy){
    $('qra').innerHTML='<div class="alert ad">Kod tidak sah. Gunakan kod pendek enam aksara atau token CourseID|Hari|Tarikh.</div>';
    return;
  }
  const pending=getPendingAttendance();
  const via=pending&&pending.shortCode===normalized?pending.via:'';
  if(isShortCode)savePendingAttendance(normalized,via);
  if(!S.token){toast('Sila log masuk dahulu.','warning');goTo('login');return}
  const btn=$('qr-submit');
  if(btn){btn.disabled=true;btn.textContent='Merekod...'}
  loading(true);
  try{
    const payload=isShortCode
      ?{shortCode:normalized,via}
      :{courseId:legacyParts[0],hari:parseInt(legacyParts[1],10),tarikh:legacyParts[2],via:'qr'};
    const r=await api('scanQR',payload);
    if(r.success||r.alreadyRecorded)completePendingAttendance();
    $('qra').innerHTML=r.success
      ?`<div class="alert as">✅ Kehadiran berjaya direkod untuk <strong>${escHtml(r.nama||'')}</strong>.</div>`
      :`<div class="alert ${r.alreadyRecorded?'ai':'ad'}">${escHtml(r.message||'Kod QR tidak sah.')}</div>`;
  }catch(e){$('qra').innerHTML='<div class="alert ad">Ralat sambungan.</div>'}
  loading(false);
  const btnSemasa=$('qr-submit');
  if(btnSemasa){btnSemasa.disabled=false;btnSemasa.textContent='Rekod Kehadiran'}
}
function pgVerifyCert(){
  const params=new URLSearchParams(window.location.hash.split('?')[1]||'');
  const certId=params.get('certId')||'';
  setView(`<div class="auth-bg"><div class="auth-card">
    <div class="auth-logos"><img src="${L.L01}"><img src="${L.L02}"><img src="${L.L03}"></div>
    <div class="auth-title">Pengesahan Sijil</div>
    <div class="auth-subtitle">Masukkan nombor sijil untuk mengesahkan kesahihannya</div>
    <div id="certa"></div>
    <div class="fg"><label>Nombor Sijil</label><input id="certn" value="${certId}" placeholder="cth. CERT-01012026-1234"></div>
    <button class="btn btn-primary btn-block" onclick="doVerify()">Sahkan Sijil</button>
    <div id="certr"></div>
    ${appVersionHtml()}
  </div></div>`);
  if(certId)setTimeout(doVerify,300);
}
async function doVerify(){
  const n=$('certn').value.trim();
  if(!n){$('certa').innerHTML='<div class="alert ad">Sila masukkan nombor sijil.</div>';return}
  loading(true);
  try{
    const r=await api('verifyCert',{certId:n});
    $('certr').innerHTML=r.success&&r.data
      ?`<div style="margin-top:20px" class="alert as"><strong>✅ Sijil Sah</strong><br>Nama: ${r.data.nama}<br>Kursus: ${r.data.namaKursus}<br>Tarikh: ${r.data.tarikhIssue}</div>`
      :`<div style="margin-top:20px" class="alert ad">❌ ${r.message||'Sijil tidak dijumpai atau tidak sah.'}</div>`;
  }catch(e){$('certr').innerHTML='<div style="margin-top:20px" class="alert ad">Ralat sambungan.</div>'}
  loading(false);
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    updateWorker=reg.waiting||null;
    reg.addEventListener('updatefound',function(){
      const w=reg.installing;
      if(!w)return;
      w.addEventListener('statechange',function(){
        if(w.state==='installed'&&navigator.serviceWorker.controller)updateWorker=w;
      });
    });
  }).catch(function(){});
}
